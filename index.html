<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    // ─── CONFIG
    const CLIENT_ID = "629470119329-cqv2csvgkcgbna6lh3vggdaii1uf2gcb.apps.googleusercontent.com";
    const SCOPES = "https://www.googleapis.com/auth/drive.appdata";
    const FILE_NAME = "butce_defterim_data.json";

    // ─── STORAGE HELPERS (local fallback)
    const S = {
      get: (k, def) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : def; } catch { return def; } },
      set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
    };

    const MONTHS = ["Oca","Şub","Mar","Nis","May","Haz","Tem","Ağu","Eyl","Eki","Kas","Ara"];
    const FULL_MONTHS = ["Ocak","Şubat","Mart","Nisan","Mayıs","Haziran","Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"];
    const now = new Date();
    const CY = now.getFullYear();
    const CM = now.getMonth();

    function uid() { return Math.random().toString(36).slice(2, 9); }

    const defaultState = () => ({
      incomeItems: [
        { id: uid(), label: "Maaş", type: "salary", amount: 0, active: true },
        { id: uid(), label: "Kira Geliri", type: "rent_income", amount: 0, active: true },
        { id: uid(), label: "Faiz Geliri", type: "interest", amount: 0, active: true },
      ],
      expenseItems: [
        { id: uid(), label: "Kira", type: "fixed", amount: 0, active: true },
        { id: uid(), label: "Kredi (Konut)", type: "installment", amount: 0, remaining: 0, active: true },
        { id: uid(), label: "Kredi Kartı Ödeme", type: "credit_card", amount: 0, active: true },
      ],
      creditCards: [
        { id: uid(), label: "Kart 1", limit: 0, cutDay: 25, dueDay: 10, color: "#e63946" },
      ],
      assets: { gold_gram: 0, gold_quarter: 0, gold_half: 0, gold_full: 0, cash_try: 0, cash_usd: 0, cash_eur: 0, investment: 0, other: 0 },
      budgets: [],
      monthlyData: {},
      prices: { gold_gram: 3200, usd: 32, eur: 35 },
      notifGranted: false,
      activeTab: "dashboard",
    });

    function getMonthKey(y, m) { return `${y}-${m}`; }

    function calcNetWorth(assets, prices) {
      return assets.gold_gram * prices.gold_gram + assets.gold_quarter * prices.gold_gram * 1.75 + assets.gold_half * prices.gold_gram * 3.5 + assets.gold_full * prices.gold_gram * 7 + assets.cash_try + assets.cash_usd * prices.usd + assets.cash_eur * prices.eur + assets.investment + assets.other;
    }

    function getMonthIncome(state, y, m) {
      const overrides = state.monthlyData[getMonthKey(y, m)]?.incomeOverrides || {};
      return state.incomeItems.filter(i => i.active).reduce((sum, i) => sum + (overrides[i.id] !== undefined ? overrides[i.id] : i.amount), 0);
    }

    function getMonthExpense(state, y, m) {
      const overrides = state.monthlyData[getMonthKey(y, m)]?.expenseOverrides || {};
      const budgetTotal = state.budgets.filter(b => b.year === y && b.month === m).reduce((s, b) => s + b.amount, 0);
      return state.expenseItems.filter(i => i.active).reduce((sum, i) => sum + (overrides[i.id] !== undefined ? overrides[i.id] : i.amount), 0) + budgetTotal;
    }

    function fmt(n) {
      if (!n && n !== 0) return "—";
      return new Intl.NumberFormat("tr-TR", { style: "currency", currency: "TRY", maximumFractionDigits: 0 }).format(n);
    }

    const INCOME_TYPES = { salary: "Maaş", rent_income: "Kira Geliri", interest: "Faiz / Mevduat", freelance: "Serbest / Proje", dividend: "Temettü", other_income: "Diğer Gelir" };
    const EXPENSE_TYPES = { fixed: "Sabit Gider", variable: "Değişken Gider", installment: "Taksit / Kredi", credit_card: "Kredi Kartı", rent: "Kira", subscription: "Abonelik", other_expense: "Diğer Gider" };

    // ─── GOOGLE DRIVE API
    async function driveRequest(method, url, token, body) {
      const res = await fetch(url, {
        method,
        headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
        body: body ? JSON.stringify(body) : undefined,
      });
      if (!res.ok) throw new Error(`Drive API error: ${res.status}`);
      return res.json();
    }

    async function findFile(token) {
      const res = await fetch(
        `https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name='${FILE_NAME}'&fields=files(id,name)`,
        { headers: { Authorization: `Bearer ${token}` } }
      );
      const data = await res.json();
      return data.files?.[0] || null;
    }

    async function saveToD(token, data) {
      const content = JSON.stringify(data);
      const existing = await findFile(token);
      if (existing) {
        // update
        await fetch(`https://www.googleapis.com/upload/drive/v3/files/${existing.id}?uploadType=media`, {
          method: "PATCH",
          headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
          body: content,
        });
      } else {
        // create
        const meta = await fetch("https://www.googleapis.com/drive/v3/files?fields=id", {
          method: "POST",
          headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
          body: JSON.stringify({ name: FILE_NAME, parents: ["appDataFolder"] }),
        });
        const { id } = await meta.json();
        await fetch(`https://www.googleapis.com/upload/drive/v3/files/${id}?uploadType=media`, {
          method: "PATCH",
          headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
          body: content,
        });
      }
    }

    async function loadFromD(token) {
      const file = await findFile(token);
      if (!file) return null;
      const res = await fetch(`https://www.googleapis.com/drive/v3/files/${file.id}?alt=media`, {
        headers: { Authorization: `Bearer ${token}` },
      });
      return res.json();
    }

    // ─── STYLES
    const st = {
      root: { minHeight: "100vh", background: "#0f0f13", color: "#e8e8e8", fontSize: 14 },

      appTitle: { fontWeight: 800, fontSize: 17, letterSpacing: "-0.3px" },
      appSub: { fontSize: 11, color: "#888", marginTop: 1 },
      headerRight: { display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" },

      notifBtn: { background: "rgba(233,196,106,.15)", border: "1px solid rgba(233,196,106,.4)", color: "#e9c46a", padding: "6px 12px", borderRadius: 8, fontSize: 12, cursor: "pointer" },
      driveBtn: { padding: "6px 12px", borderRadius: 8, fontSize: 12, cursor: "pointer", border: "none", fontWeight: 700 },
      nav: { display: "flex", overflowX: "auto", gap: 2, padding: "8px 16px", background: "rgba(255,255,255,.02)", borderBottom: "1px solid rgba(255,255,255,.06)" },
      navBtn: { display: "flex", alignItems: "center", gap: 6, padding: "8px 14px", borderRadius: 8, border: "none", background: "transparent", color: "#888", cursor: "pointer", fontSize: 13, fontWeight: 500, whiteSpace: "nowrap" },
      navBtnActive: { background: "rgba(233,196,106,.15)", color: "#e9c46a", fontWeight: 700 },
      main: { padding: "24px 20px", maxWidth: 960, margin: "0 auto" },
      tabContent: { display: "flex", flexDirection: "column", gap: 20 },

      kpiGrid: { display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(180px,1fr))", gap: 14 },
      kpiCard: { background: "rgba(255,255,255,.05)", borderRadius: 14, padding: "18px 16px" },

      listRight: { display: "flex", alignItems: "center", gap: 8 },
      listLabel: { fontWeight: 600, fontSize: 14 },
      listSub: { fontSize: 11, color: "#888", marginTop: 2 },
      amtInput: { width: 100, padding: "6px 10px", borderRadius: 8, background: "rgba(255,255,255,.08)", border: "1px solid rgba(255,255,255,.1)", color: "#f0f0f0", fontSize: 14, fontWeight: 600, textAlign: "right" },
      currency: { fontSize: 12, color: "#888" },

      formRow: { display: "flex", gap: 10, flexWrap: "wrap", marginBottom: 10 },
      input: { flex: 1, minWidth: 120, padding: "9px 12px", borderRadius: 8, background: "rgba(255,255,255,.06)", border: "1px solid rgba(255,255,255,.12)", color: "#f0f0f0", fontSize: 13 },
      select: { flex: 1, minWidth: 140, padding: "9px 12px", borderRadius: 8, background: "rgba(255,255,255,.06)", border: "1px solid rgba(255,255,255,.12)", color: "#f0f0f0", fontSize: 13 },
      addBtn: { padding: "9px 18px", borderRadius: 8, background: "linear-gradient(135deg, #e9c46a, #f4a261)", border: "none", color: "#0f0f13", fontWeight: 800, cursor: "pointer", fontSize: 13 },

      paidBtn: { padding: "7px 16px", borderRadius: 8, border: "none", color: "#fff", fontWeight: 700, cursor: "pointer", fontSize: 12 },
      dueRow: { display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 0", borderBottom: "1px solid rgba(255,255,255,.06)" },
      dueLabel: { fontWeight: 600 },
      dueAmt: { fontSize: 12, color: "#e9c46a", marginTop: 2 },

      ccLabel: { fontSize: 18, fontWeight: 800 },
      ccDelete: { background: "rgba(0,0,0,.3)", border: "none", color: "#fff", width: 26, height: 26, borderRadius: 6, cursor: "pointer", fontSize: 11 },
      ccLimit: { fontSize: 13, opacity: 0.9, marginBottom: 16 },

      ccDateSep: { opacity: 0.5, fontSize: 20 },

      ccDateVal: { fontSize: 28, fontWeight: 900, lineHeight: 1 },

      cardRow: { display: "flex", alignItems: "center", gap: 12, padding: "10px 0", borderBottom: "1px solid rgba(255,255,255,.06)" },
      cardDot: { width: 12, height: 12, borderRadius: "50%", flexShrink: 0 },
      assetRow: { display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 0", borderBottom: "1px solid rgba(255,255,255,.05)" },
      assetLabel: { color: "#ccc", fontSize: 13 },
      assetInput: { display: "flex", alignItems: "center", gap: 6 },
      priceField: { flex: 1, minWidth: 120 },

      barGroup: { flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 4 },

      budgetTop: { display: "flex", justifyContent: "space-between", marginBottom: 10 },
      budgetLabel: { fontWeight: 700, fontSize: 15 },
      budgetDate: { fontSize: 11, color: "#888", marginTop: 3 },
      budgetAmt: { fontSize: 22, fontWeight: 900, color: "#e9c46a" },
      budgetNote: { fontSize: 11, color: "#888", marginTop: 8 },
      toast: { position: "fixed", bottom: 24, right: 24, zIndex: 9999, padding: "12px 20px", borderRadius: 12, fontWeight: 700, color: "#fff", fontSize: 14, boxShadow: "0 8px 32px rgba(0,0,0,.4)", animation: "fadein .2s ease" },
      empty: { color: "#666", fontSize: 13, padding: "12px 0", textAlign: "center" },
      syncBar: { display: "flex", alignItems: "center", gap: 8, padding: "10px 16px", background: "rgba(42,157,143,.1)", borderBottom: "1px solid rgba(42,157,143,.2)", fontSize: 12, color: "#2a9d8f" },
    };

    function totalBannerStyle(color) {
      return { padding: "12px 18px", borderRadius: 12, background: color + "22", border: `1px solid ${color}44`, color, fontWeight: 700, fontSize: 16 };
    }
    function toggleBtnStyle(active) {
      return { width: 20, height: 20, border: "none", background: "none", color: active ? "#2a9d8f" : "#555", cursor: "pointer", fontSize: 16, padding: 0 };
    }

    // ─── SHARED COMPONENTS
    function KpiCard({ label, value, color, icon }) {
      return (
        <div style={{ ...st.kpiCard, borderTop: `3px solid ${color}` }}>
          <div style={{ ...st.kpiIcon, color }}>{icon}</div>
          <div style={st.kpiValue}>{value}</div>
          <div style={st.kpiLabel}>{label}</div>
        </div>
      );
    }
    function ItemRow({ label, amount, color }) {
      return (
        <div style={st.itemRow}>
          <span style={st.itemLabel}>{label}</span>
          <span style={{ ...st.itemAmt, color }}>{fmt(amount)}</span>
        </div>
      );
    }
    function MiniBar({ data }) {
      const max = Math.max(...data.map(r => Math.max(r.income, r.expense)), 1);
      return (
        <div style={st.miniBar}>
          {data.map((row, i) => (
            <div key={i} style={st.miniBarGroup}>
              <div style={{ flex: 1, display: "flex", alignItems: "flex-end", gap: 1 }}>
                <div style={{ flex: 1, height: `${(row.income / max) * 60}px`, background: "#2a9d8f", borderRadius: "2px 2px 0 0", minHeight: 2 }} />
                <div style={{ flex: 1, height: `${(row.expense / max) * 60}px`, background: "#e63946", borderRadius: "2px 2px 0 0", minHeight: 2 }} />
              </div>
              <div style={{ fontSize: 9, color: "#888", marginTop: 2 }}>{MONTHS[i]}</div>
            </div>
          ))}
        </div>
      );
    }

    // ─── TAB COMPONENTS
    function Dashboard({ state, forecastWithCumul, due, togglePayment }) {
      const thisMonth = forecastWithCumul[CM] || { income: 0, expense: 0, net: 0 };
      const netWorth = calcNetWorth(state.assets, state.prices);
      return (
        <div style={st.tabContent}>
          <div style={st.sectionTitle}>Bu Ay · {FULL_MONTHS[CM]} {CY}</div>
          <div style={st.kpiGrid}>
            <KpiCard label="Aylık Gelir" value={fmt(thisMonth.income)} color="#2a9d8f" icon="↑" />
            <KpiCard label="Aylık Gider" value={fmt(thisMonth.expense)} color="#e63946" icon="↓" />
            <KpiCard label="Net Tasarruf" value={fmt(thisMonth.net)} color={thisMonth.net >= 0 ? "#2a9d8f" : "#e63946"} icon="=" />
            <KpiCard label="Toplam Varlık" value={fmt(netWorth)} color="#e9c46a" icon="◈" />
          </div>
          {due.length > 0 && (
            <div style={st.card}>
              <div style={st.cardTitle}>🔔 Bugün Yapılacak Ödemeler</div>
              {due.map(item => (
                <div key={item.id} style={st.dueRow}>
                  <div>
                    <div style={st.dueLabel}>{item.label}</div>
                    {!item.isCard && <div style={st.dueAmt}>{fmt(item.amount)}</div>}
                  </div>
                  {!item.isCut && (
                    <button style={{ ...st.paidBtn, background: "#e63946" }} onClick={() => togglePayment(item.key, item.id)}>✓ Ödedim</button>
                  )}
                </div>
              ))}
            </div>
          )}
          <div style={st.card}>
            <div style={st.cardTitle}>Yıl Boyu Birikim Grafiği</div>
            <MiniBar data={forecastWithCumul} />
          </div>
          <div style={st.row2col}>
            <div style={st.card}>
              <div style={st.cardTitle}>Gelir Kalemleri</div>
              {state.incomeItems.filter(i => i.active).map(i => <ItemRow key={i.id} label={i.label} amount={i.amount} color="#2a9d8f" />)}
            </div>
            <div style={st.card}>
              <div style={st.cardTitle}>Gider Kalemleri</div>
              {state.expenseItems.filter(i => i.active).map(i => <ItemRow key={i.id} label={i.label} amount={i.amount} color="#e63946" />)}
            </div>
          </div>
        </div>
      );
    }

    function IncomeTab({ state, upd, showToast }) {
      const [form, setForm] = useState({ label: "", type: "salary", amount: "" });
      const total = state.incomeItems.filter(i => i.active).reduce((s, i) => s + i.amount, 0);
      return (
        <div style={st.tabContent}>
          <div style={st.sectionTitle}>Gelir Kalemleri</div>
          <div style={totalBannerStyle("#2a9d8f")}>Toplam Aylık Gelir: {fmt(total)}</div>
          <div style={st.card}>
            {state.incomeItems.map(item => (
              <div key={item.id} style={{ ...st.listRow, opacity: item.active ? 1 : 0.45 }}>
                <div style={st.listLeft}>
                  <button style={toggleBtnStyle(item.active)} onClick={() => upd(s => { s.incomeItems = s.incomeItems.map(i => i.id === item.id ? { ...i, active: !i.active } : i); })}>{item.active ? "●" : "○"}</button>
                  <div>
                    <div style={st.listLabel}>{item.label}</div>
                    <div style={st.listSub}>{INCOME_TYPES[item.type] || item.type}</div>
                  </div>
                </div>
                <div style={st.listRight}>
                  <input style={st.amtInput} type="number" value={item.amount} onChange={e => upd(s => { s.incomeItems = s.incomeItems.map(i => i.id === item.id ? { ...i, amount: +e.target.value } : i); })} />
                  <span style={st.currency}>₺</span>
                  <button style={st.deleteBtn} onClick={() => upd(s => { s.incomeItems = s.incomeItems.filter(i => i.id !== item.id); })}>✕</button>
                </div>
              </div>
            ))}
          </div>
          <div style={st.card}>
            <div style={st.cardTitle}>Yeni Gelir Kalemi</div>
            <div style={st.formRow}>
              <input style={st.input} placeholder="Kalem adı" value={form.label} onChange={e => setForm(f => ({ ...f, label: e.target.value }))} />
              <select style={st.select} value={form.type} onChange={e => setForm(f => ({ ...f, type: e.target.value }))}>
                {Object.entries(INCOME_TYPES).map(([k, v]) => <option key={k} value={k}>{v}</option>)}
              </select>
              <input style={st.input} type="number" placeholder="Tutar ₺" value={form.amount} onChange={e => setForm(f => ({ ...f, amount: e.target.value }))} />
              <button style={st.addBtn} onClick={() => {
                if (!form.label || !form.amount) return;
                upd(s => { s.incomeItems = [...s.incomeItems, { id: uid(), ...form, amount: +form.amount, active: true }]; });
                setForm({ label: "", type: "salary", amount: "" });
                showToast("Gelir kalemi eklendi");
              }}>+ Ekle</button>
            </div>
          </div>
        </div>
      );
    }

    function ExpensesTab({ state, upd, showToast }) {
      const [form, setForm] = useState({ label: "", type: "fixed", amount: "", remaining: "", dueDay: "" });
      const total = state.expenseItems.filter(i => i.active).reduce((s, i) => s + i.amount, 0);
      return (
        <div style={st.tabContent}>

    // ─── MAIN APP
    function BudgetApp() {
      const [state, setState] = useState(() => {
        const saved = S.get("bütçe_app_v2", null);
        return saved ? { ...defaultState(), ...saved } : defaultState();
      });
      const [toast, setToast] = useState(null);
      const [driveToken, setDriveToken] = useState(null);
      const [driveStatus, setDriveStatus] = useState("idle"); // idle | syncing | synced | error
      const [lastSync, setLastSync] = useState(S.get("last_sync", null));
      const tokenClientRef = useRef(null);

      useEffect(() => { S.set("bütçe_app_v2", state); }, [state]);
      useEffect(() => {
        if (toast) { const t = setTimeout(() => setToast(null), 3200); return () => clearTimeout(t); }
      }, [toast]);

      const showToast = (msg, type = "success") => setToast({ msg, type });
      const upd = useCallback((fn) => setState(s => { const ns = { ...s }; fn(ns); return ns; }), []);

      // Init Google token client
      useEffect(() => {
        const interval = setInterval(() => {
          if (window.google?.accounts?.oauth2) {
            clearInterval(interval);
            tokenClientRef.current = window.google.accounts.oauth2.initTokenClient({
              client_id: CLIENT_ID,
              scope: SCOPES,
              callback: async (resp) => {
                if (resp.error) { showToast("Google bağlantı hatası", "error"); return; }
                setDriveToken(resp.access_token);
                showToast("Google Drive'a bağlandı ✓");
              },
            });
          }
        }, 200);
        return () => clearInterval(interval);
      }, []);

      const connectDrive = () => {
        if (tokenClientRef.current) tokenClientRef.current.requestAccessToken();
        else showToast("Google API yükleniyor, lütfen bekleyin...", "error");
      };

      const saveToDrive = async () => {
        if (!driveToken) { connectDrive(); return; }
        setDriveStatus("syncing");
        try {
          await saveToD(driveToken, state);
          const t = new Date().toLocaleTimeString("tr-TR");
          setLastSync(t);
          S.set("last_sync", t);
          setDriveStatus("synced");
          showToast("Drive'a kaydedildi ✓");
        } catch (e) {
          setDriveStatus("error");
          showToast("Kaydetme hatası: " + e.message, "error");
        }
      };

      const loadFromDrive = async () => {
        if (!driveToken) { connectDrive(); return; }
        setDriveStatus("syncing");
        try {
          const data = await loadFromD(driveToken);
          if (data) {
            setState({ ...defaultState(), ...data });
            showToast("Drive'dan yüklendi ✓");
          } else {
            showToast("Drive'da kayıt bulunamadı");
          }
          setDriveStatus("synced");
        } catch (e) {
          setDriveStatus("error");
          showToast("Yükleme hatası: " + e.message, "error");
        }
      };

      const togglePayment = (monthKey, itemId) => {
        upd(s => {
          if (!s.monthlyData[monthKey]) s.monthlyData = { ...s.monthlyData, [monthKey]: {} };
          const md = { ...s.monthlyData[monthKey] };
          const payments = { ...(md.payments || {}) };
          payments[itemId] = !payments[itemId];
          md.payments = payments;
          s.monthlyData = { ...s.monthlyData, [monthKey]: md };
        });
        showToast("Ödeme durumu güncellendi ✓");
      };

      const todayDue = () => {
        const d = now.getDate();
        const key = getMonthKey(CY, CM);
        const payments = state.monthlyData[key]?.payments || {};
        const due = [];
        state.expenseItems.filter(i => i.active && i.dueDay === d).forEach(i => { if (!payments[i.id]) due.push({ ...i, key }); });
        state.creditCards.forEach(c => {
          if (c.dueDay === d) due.push({ id: c.id, label: `${c.label} Son Ödeme`, key, isCard: true });
          if (c.cutDay === d) due.push({ id: `cut_${c.id}`, label: `${c.label} Hesap Kesim`, key, isCard: true, isCut: true });
        });
        return due;
      };

      let cum = 0;
      const forecastWithCumul = Array.from({ length: 12 }, (_, m) => {
        const income = getMonthIncome(state, CY, m);
        const expense = getMonthExpense(state, CY, m);
        cum += income - expense;
        return { m, income, expense, net: income - expense, cumulative: cum };
      });

      const due = todayDue();
      const tab = state.activeTab;
      const setTab = (t) => upd(s => { s.activeTab = t; });

      const tabs = [
        { id: "dashboard", icon: "◉", label: "Özet" },
        { id: "income", icon: "↑", label: "Gelirler" },
        { id: "expenses", icon: "↓", label: "Giderler" },
        { id: "payments", icon: "✓", label: "Ödemeler" },
        { id: "cards", icon: "▣", label: "Kartlar" },
        { id: "assets", icon: "◈", label: "Varlıklar" },
        { id: "forecast", icon: "⤴", label: "Projeksiyon" },
        { id: "budgets", icon: "◎", label: "Bütçeler" },
      ];

      const syncColor = driveStatus === "synced" ? "#2a9d8f" : driveStatus === "syncing" ? "#e9c46a" : driveStatus === "error" ? "#e63946" : "#888";

      return (
        <div style={st.root}>
          <header style={st.header}>
            <div style={st.headerLeft}>
              <div style={st.logo}>₺</div>
              <div>
                <div style={st.appTitle}>Bütçe Defterim</div>
                <div style={st.appSub}>{CY} · Kişisel Finans</div>
              </div>
            </div>
            <div style={st.headerRight}>
              {due.length > 0 && <div style={st.dueBadge} onClick={() => setTab("payments")}>🔔 {due.length} ödeme bugün</div>}

              {/* Drive buttons */}
              {!driveToken ? (
                <button style={{ ...st.driveBtn, background: "rgba(66,133,244,.2)", color: "#4285f4", border: "1px solid rgba(66,133,244,.4)" }} onClick={connectDrive}>
                  ☁ Drive'a Bağlan
                </button>
              ) : (
                <>
                  <button style={{ ...st.driveBtn, background: "rgba(42,157,143,.2)", color: "#2a9d8f", border: "1px solid rgba(42,157,143,.4)" }} onClick={saveToDrive}>
                    {driveStatus === "syncing" ? "⏳ Kaydediyor..." : "↑ Kaydet"}
                  </button>
                  <button style={{ ...st.driveBtn, background: "rgba(233,196,106,.15)", color: "#e9c46a", border: "1px solid rgba(233,196,106,.3)" }} onClick={loadFromDrive}>
                    ↓ Yükle
                  </button>
                </>
              )}
            </div>
          </header>

          {/* Sync status bar */}
          {driveToken && (
            <div style={{ ...st.syncBar, color: syncColor }}>
              <span>☁</span>
              <span>Drive bağlı{lastSync ? ` · Son kayıt: ${lastSync}` : " · Henüz kaydedilmedi"}</span>
              <span style={{ marginLeft: "auto", fontSize: 11, color: "#666" }}>Veriler sadece sizin Drive'ınızda</span>
            </div>
          )}

          <nav style={st.nav}>
            {tabs.map(t => (
              <button key={t.id} style={{ ...st.navBtn, ...(tab === t.id ? st.navBtnActive : {}) }} onClick={() => setTab(t.id)}>
                <span>{t.icon}</span><span>{t.label}</span>
              </button>
            ))}
          </nav>

          <main style={st.main}>
            {tab === "dashboard" && <Dashboard state={state} forecastWithCumul={forecastWithCumul} due={due} togglePayment={togglePayment} />}
            {tab === "income" && <IncomeTab state={state} upd={upd} showToast={showToast} />}
            {tab === "expenses" && <ExpensesTab state={state} upd={upd} showToast={showToast} />}
            {tab === "payments" && <PaymentsTab state={state} upd={upd} togglePayment={togglePayment} />}
            {tab === "cards" && <CardsTab state={state} upd={upd} showToast={showToast} />}
            {tab === "assets" && <AssetsTab state={state} upd={upd} />}
            {tab === "forecast" && <ForecastTab forecastWithCumul={forecastWithCumul} />}
            {tab === "budgets" && <BudgetsTab state={state} upd={upd} showToast={showToast} />}
          </main>

          {toast && <div style={{ ...st.toast, background: toast.type === "error" ? "#e63946" : "#2a9d8f" }}>{toast.msg}</div>}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<BudgetApp />);
  </script>
</body>
</html>
