var CLIENT_ID="629470119329-cqv2csvgkcgbna6lh3vggdaii1uf2gcb.apps.googleusercontent.com";

var FILE_NAME="butce_v6.json";

var LS={
  get:function(k,d){try{var v=localStorage.getItem(k);return v?JSON.parse(v):d}catch(ex){return d}},
  set:function(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(ex){}}
};

var MONTHS=["Oca","Şub","Mar","Nis","May","Haz","Tem","Ağu","Eyl","Eki","Kas","Ara"];
var FULL_MONTHS=["Ocak","Şubat","Mart","Nisan","Mayıs","Haziran","Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"];
var NOW=new Date();
var CY=NOW.getFullYear();
var CM=NOW.getMonth();
var CD=NOW.getDate();

var GOLD_W={gold_gram:1,gold_quarter:1.75,gold_half:3.5,gold_full:7};
var INC_TYPES={salary:"Maaş",rent_income:"Kira Geliri",interest:"Faiz",freelance:"Serbest",dividend:"Temettü",other_income:"Diğer"};
var EXP_TYPES={fixed:"Sabit",variable:"Değişken",installment:"Taksit",credit_card:"Kredi Kartı",rent:"Kira",subscription:"Abonelik",other_expense:"Diğer"};
var INV_TYPES={gold_gram:"Gram Altın",gold_quarter:"Çeyrek",gold_half:"Yarım",gold_full:"Tam Altın",deposit_try:"Vadeli Mevduat TL",deposit_usd:"Vadeli Mevduat USD",deposit_eur:"Vadeli Mevduat EUR",fund:"Fon",stock:"Hisse",crypto:"Kripto",other:"Diğer"};

function uid(){return Math.random().toString(36).slice(2,9)}
function mkey(y,m){return y+"-"+m}
function fmt(n){if(n==null)return"—";return new Intl.NumberFormat("tr-TR",{style:"currency",currency:"TRY",maximumFractionDigits:0}).format(n)}
function dLeft(day){return((day-CD+31)%31)||31}
function dDiff(ds){if(!ds)return null;return Math.round((new Date(ds)-NOW)/864e5)}

function posVal(pos,prices){
  if(pos.type.startsWith("gold_"))return pos.quantity*(GOLD_W[pos.type]||1)*prices.gold_gram;
  if(pos.type==="deposit_try")return pos.principal*(1+(pos.rate||0)/100*(pos.days||365)/365);
  if(pos.type==="deposit_usd")return pos.principal*(1+(pos.rate||0)/100*(pos.days||365)/365)*prices.usd;
  if(pos.type==="deposit_eur")return pos.principal*(1+(pos.rate||0)/100*(pos.days||365)/365)*prices.eur;
  return pos.currentValue||pos.principal||0;
}
function portVal(portfolio,prices){return(portfolio||[]).filter(function(p){return p.active}).reduce(function(s,p){return s+posVal(p,prices)},0)}
function nWorth(state){var a=state.assets,p=state.prices;return a.cash_try+a.cash_usd*p.usd+a.cash_eur*p.eur+a.other+portVal(state.portfolio,p)}
function mIncome(state,y,m){var ov=((state.monthlyData[mkey(y,m)]||{}).incomeOverrides)||{};return state.incomeItems.filter(function(i){return i.active}).reduce(function(s,i){return s+(ov[i.id]!=null?ov[i.id]:i.amount)},0)}
function mExpense(state,y,m){var ov=((state.monthlyData[mkey(y,m)]||{}).expenseOverrides)||{};var bt=(state.budgets||[]).filter(function(b){return b.year===y&&b.month===m}).reduce(function(s,b){return s+b.amount},0);return state.expenseItems.filter(function(i){return i.active}).reduce(function(s,i){return s+(ov[i.id]!=null?ov[i.id]:i.amount)},0)+bt}

function mkDefault(){
  return {
    incomeItems:[

      {id:uid(),label:"Kredi Kartı",type:"credit_card",amount:0,active:true,dueDay:10,remaining:0}
    ],
    creditCards:[{id:uid(),label:"Kart 1",limit:0,cutDay:25,dueDay:10,color:"#e63946"}],
    assets:{cash_try:0,cash_usd:0,cash_eur:0,other:0},
    portfolio:[],
    budgets:[],
    monthlyData:{},
    prices:{gold_gram:3200,usd:38,eur:42},
    activeTab:"dashboard"
  };
}

// Drive
function dFind(t){return fetch("https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name%3D'"+FILE_NAME+"'&fields=files(id)",{headers:{Authorization:"Bearer "+t}}).then(function(r){return r.json()}).then(function(d){return(d.files||[])[0]||null})}
function dSave(t,data){var body=JSON.stringify(data);return dFind(t).then(function(ex){if(ex){return fetch("https://www.googleapis.com/upload/drive/v3/files/"+ex.id+"?uploadType=media",{method:"PATCH",headers:{Authorization:"Bearer "+t,"Content-Type":"application/json"},body:body})}else{return fetch("https://www.googleapis.com/drive/v3/files?fields=id",{method:"POST",headers:{Authorization:"Bearer "+t,"Content-Type":"application/json"},body:JSON.stringify({name:FILE_NAME,parents:["appDataFolder"]})}).then(function(m){return m.json()}).then(function(r){return fetch("https://www.googleapis.com/upload/drive/v3/files/"+r.id+"?uploadType=media",{method:"PATCH",headers:{Authorization:"Bearer "+t,"Content-Type":"application/json"},body:body})})}})}
function dLoad(t){return dFind(t).then(function(f){if(!f)return null;return fetch("https://www.googleapis.com/drive/v3/files/"+f.id+"?alt=media",{headers:{Authorization:"Bearer "+t}}).then(function(r){return r.json()})})}

function fetchPrices(){
  return fetch("https://api.frankfurter.app/latest?from=USD&to=TRY,EUR")
    .then(function(r){return r.json()})
    .then(function(d){
      var usd=d.rates.TRY;
      var eur=(1/d.rates.EUR)*usd;
      return fetch("https://gold-api.com/price/XAU").then(function(r){return r.json()}).then(function(g){
        return {usd:Math.round(usd*100)/100,eur:Math.round(eur*100)/100,gold_gram:Math.round(g.price*usd/31.1035)};
      }).catch(function(){
        var c=LS.get("cached_prices",null);
        return {usd:Math.round(usd*100)/100,eur:Math.round(eur*100)/100,gold_gram:c?c.gold_gram:null};
      });
    })
    .catch(function(){
      return fetch("https://open.er-api.com/v6/latest/USD").then(function(r){return r.json()}).then(function(d){
        var usd=d.rates.TRY;var eur=(1/d.rates.EUR)*usd;var c=LS.get("cached_prices",null);
        return {usd:Math.round(usd*100)/100,eur:Math.round(eur*100)/100,gold_gram:c?c.gold_gram:null};
      });
    });
}

// Style helpers
var sc={
  card:{background:"rgba(255,255,255,.05)",borderRadius:14,padding:"14px 15px",border:"1px solid rgba(255,255,255,.07)",marginBottom:12},

  addbtn:{padding:"7px 13px",borderRadius:8,background:"linear-gradient(135deg,#e9c46a,#f4a261)",border:"none",color:"#0f0f13",fontWeight:800,cursor:"pointer",fontSize:12,flexShrink:0},
  delbtn:{background:"rgba(230,57,70,.2)",border:"none",color:"#e63946",width:25,height:25,borderRadius:5,cursor:"pointer",fontSize:11,flexShrink:0},

};
function prow(bg){return{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 11px",borderRadius:9,marginBottom:5,background:bg||"rgba(255,255,255,.03)"}}
function pbtn(bg,fg){return{padding:"5px 11px",borderRadius:6,border:"none",background:bg,color:fg||"#fff",fontWeight:700,cursor:"pointer",fontSize:11,whiteSpace:"nowrap"}}
function hbtn(bg,color,border,label,onClick){return e("button",{style:{padding:"4px 9px",borderRadius:7,fontSize:11,cursor:"pointer",border:"1px solid "+border,background:bg,color:color,fontWeight:700},onClick:onClick},label)}

function KCard(props){
  return e("div",{style:{background:"rgba(255,255,255,.05)",borderRadius:12,padding:"12px 13px",borderTop:"3px solid "+props.color}},
    e("div",{style:{fontSize:17,marginBottom:4,color:props.color}},props.icon),
    e("div",{style:{fontSize:14,fontWeight:800}},props.value),
    e("div",{style:{fontSize:10,color:"#888",marginTop:2}},props.label)
  );
}

function MiniBar(props){
  var data=props.data;
  var max=1;
  data.forEach(function(r){if(r.inc>max)max=r.inc;if(r.exp>max)max=r.exp});
  return e("div",{style:{display:"flex",gap:3,alignItems:"flex-end",height:58}},
    data.map(function(row,i){
      return e("div",{key:i,style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",height:"100%"}},
        e("div",{style:{flex:1,display:"flex",alignItems:"flex-end",gap:1,width:"100%"}},
          e("div",{style:{flex:1,height:Math.round((row.inc/max)*48)+"px",background:"#2a9d8f",borderRadius:"2px 2px 0 0",minHeight:2}}),
          e("div",{style:{flex:1,height:Math.round((row.exp/max)*48)+"px",background:"#e63946",borderRadius:"2px 2px 0 0",minHeight:2}})
        ),
        e("div",{style:{fontSize:8,color:"#888",marginTop:2}},MONTHS[i])
      );
    })
  );
}

function Dashboard(props){
  var state=props.state,forecast=props.forecast,due=props.due,todayInc=props.todayInc;
  var p=state.prices;
  var tm=forecast[CM]||{inc:0,exp:0,net:0,cum:0};
  var nw=nWorth(state);
  var pv=portVal(state.portfolio,p);
  return e("div",{style:{display:"flex",flexDirection:"column",gap:13}},
    e("div",{style:{fontSize:16,fontWeight:800}},"Bu Ay · "+FULL_MONTHS[CM]+" "+CY),
    e("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))",gap:9,marginBottom:3}},
      e(KCard,{label:"Aylık Gelir",value:fmt(tm.inc),color:"#2a9d8f",icon:"↑"}),
      e(KCard,{label:"Aylık Gider",value:fmt(tm.exp),color:"#e63946",icon:"↓"}),
      e(KCard,{label:"Net Tasarruf",value:fmt(tm.net),color:tm.net>=0?"#2a9d8f":"#e63946",icon:"="}),
      e(KCard,{label:"Toplam Varlık",value:fmt(nw),color:"#e9c46a",icon:"◈"}),
      e(KCard,{label:"Portföy",value:fmt(pv),color:"#f4a261",icon:"📊"})
    ),
    todayInc.length>0&&e("div",{style:sc.card},
      e("div",{style:sc.ct},"💰 Bugün Beklenen Gelirler"),
      todayInc.map(function(item){
        var mk2=mkey(CY,CM);
        var col=!!(((state.monthlyData[mk2]||{}).incomeCollected)||{})[item.id];
        return e("div",{key:item.id,style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:"1px solid rgba(255,255,255,.06)"}},
          e("div",null,e("div",{style:{fontWeight:600}},item.label),e("div",{style:{fontSize:11,color:"#e9c46a"}},fmt(item.amount))),
          e("button",{style:pbtn(col?"#2a9d8f":"#e9c46a",col?"#fff":"#0f0f13"),onClick:function(){props.toggleInc(mk2,item.id)}},col?"✓ Geldi":"Geldi mi?")
        );
      })
    ),
    due.length>0&&e("div",{style:sc.card},
      e("div",{style:sc.ct},"🔔 Bugün Yapılacak Ödemeler"),
      due.map(function(item){
        return e("div",{key:item.id,style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:"1px solid rgba(255,255,255,.06)"}},
          e("div",null,e("div",{style:{fontWeight:600}},item.label),!item.isCard&&e("div",{style:{fontSize:11,color:"#e9c46a"}},fmt(item.amount))),
          !item.isCut&&e("button",{style:pbtn("#e63946"),onClick:function(){props.togglePay(item.mk,item.id)}},"✓ Ödedim")
        );
      })
    ),
    e("div",{style:sc.card},e("div",{style:sc.ct},"Yıl Boyu Birikim"),e(MiniBar,{data:forecast})),
    e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:11}},
      e("div",{style:sc.card},e("div",{style:sc.ct},"Gelir Kalemleri"),
        state.incomeItems.filter(function(i){return i.active}).map(function(i){
          return e("div",{key:i.id,style:sc.irow},e("span",{style:{color:"#ccc",fontSize:12}},i.label,i.incomeDay===CD&&e("span",{style:sc.tag},"BUGÜN")),e("span",{style:{fontWeight:700,color:"#2a9d8f",fontSize:12}},fmt(i.amount)));
        })
      ),
      e("div",{style:sc.card},e("div",{style:sc.ct},"Gider Kalemleri"),
        state.expenseItems.filter(function(i){return i.active}).map(function(i){
          return e("div",{key:i.id,style:sc.irow},e("span",{style:{color:"#ccc",fontSize:12}},i.label,i.dueDay===CD&&e("span",{style:sc.tag},"BUGÜN")),e("span",{style:{fontWeight:700,color:"#e63946",fontSize:12}},fmt(i.amount)));
        })
      )
    )
  );
}

function IncomeTab(props){
  var state=props.state,upd=props.upd,toast=props.toast;
  var formS=useState({label:"",type:"salary",amount:"",incomeDay:""});
  var form=formS[0],setForm=formS[1];
  var total=state.incomeItems.filter(function(i){return i.active}).reduce(function(s,i){return s+i.amount},0);
  return e("div",{style:{display:"flex",flexDirection:"column",gap:13}},
    e("div",{style:{fontSize:16,fontWeight:800}},"Gelir Kalemleri"),
    e("div",{style:{padding:"9px 13px",borderRadius:10,background:"rgba(42,157,143,.12)",border:"1px solid rgba(42,157,143,.25)",color:"#2a9d8f",fontWeight:700}},"Toplam: "+fmt(total)),
    e("div",{style:sc.card},
      state.incomeItems.map(function(it){
        return e("div",{key:it.id,style:Object.assign({},sc.lrow,{opacity:it.active?1:0.45})},
          e("div",{style:{display:"flex",alignItems:"center",gap:7}},
            e("button",{style:{width:17,height:17,border:"none",background:"none",color:it.active?"#2a9d8f":"#555",cursor:"pointer",fontSize:13,padding:0},onClick:function(){upd(function(s){s.incomeItems=s.incomeItems.map(function(i){return i.id===it.id?Object.assign({},i,{active:!i.active}):i})})}},it.active?"●":"○"),

            e("button",{style:Object.assign({},sc.addbtn,{padding:"6px 8px",fontSize:10}),onClick:calcMat},"Hesapla")
          )
        )
      ),
      e("button",{style:sc.addbtn,onClick:function(){
        if(!form.label)return;
        var pos={id:uid(),active:true,label:form.label,type:form.type,principal:+form.principal||0,quantity:+form.quantity||0,rate:+form.rate||0,days:+form.days||365,currentValue:+form.currentValue||0,startDate:form.startDate,maturityDate:form.maturityDate};
        upd(function(s){s.portfolio=s.portfolio.concat([pos])});
        setForm({label:"",type:"deposit_try",principal:"",quantity:"",rate:"",days:"365",startDate:TODAY,maturityDate:"",currentValue:""});
        toast("Pozisyon eklendi ✓");
      }},"+ Ekle")
    )
  );
}

              e("td",{style:{padding:"6px 8px",textAlign:"right",borderBottom:"1px solid rgba(255,255,255,.05)",color:"#2a9d8f"}},fmt(row.inc)),
              e("td",{style:{padding:"6px 8px",textAlign:"right",borderBottom:"1px solid rgba(255,255,255,.05)",color:"#e63946"}},fmt(row.exp)),

              e("td",{style:{padding:"6px 8px",textAlign:"right",borderBottom:"1px solid rgba(255,255,255,.05)",color:row.cum>=0?"#e9c46a":"#e63946",fontWeight:700}},fmt(row.cum))
            );
          }))
        )
      )
    ),
    e("div",{style:sc.card},

      e("div",{style:{display:"flex",gap:4,alignItems:"flex-end",height:110,marginTop:7}},
        forecast.map(function(row,i){
          return e("div",{key:i,style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}},
            e("div",{style:{width:"100%",display:"flex",gap:2,alignItems:"flex-end",height:88}},
              e("div",{style:{flex:1,height:Math.round((row.inc/maxVal)*86)+"%",background:"#2a9d8f",borderRadius:"2px 2px 0 0",minHeight:3}}),
              e("div",{style:{flex:1,height:Math.round((row.exp/maxVal)*86)+"%",background:"#e63946",borderRadius:"2px 2px 0 0",minHeight:3}})
            ),
            e("div",{style:{fontSize:8,color:i===CM?"#e9c46a":"#888",fontWeight:i===CM?700:400}},MONTHS[i])
          );
        })
      ),
      e("div",{style:{marginTop:7,fontSize:11,color:"#888"}},e("span",{style:{color:"#2a9d8f"}},"■ Gelir"),e("span",{style:{color:"#e63946",marginLeft:10}},"■ Gider"))
    )
  );
}

  return e("div",{style:{display:"flex",flexDirection:"column",gap:13}},

      ),
      e("div",{style:sc.frow},

        ),

function App(){
  var savedState=LS.get("butce_v6",null);
  var stateS=useState(savedState?Object.assign(mkDefault(),savedState):mkDefault());
  var state=stateS[0],setState=stateS[1];
  var toastS=useState(null);var toastMsg=toastS[0],setToastMsg=toastS[1];
  var dtS=useState(null);var driveToken=dtS[0],setDriveToken=dtS[1];
  var dsS=useState("idle");var dStatus=dsS[0],setDStatus=dsS[1];
  var lsS=useState(LS.get("last_sync",""));var lastSync=lsS[0],setLastSync=lsS[1];
  var tokenRef=useRef(null);

  useEffect(function(){LS.set("butce_v6",state)},[state]);
  useEffect(function(){if(toastMsg){var t=setTimeout(function(){setToastMsg(null)},2800);return function(){clearTimeout(t)}}},[toastMsg]);

  var toast=function(msg){setToastMsg(msg)};
  var upd=useCallback(function(fn){setState(function(s){var n=Object.assign({},s);fn(n);return n})},[]);

  useEffect(function(){
    var iv=setInterval(function(){
      if(window.google&&window.google.accounts&&window.google.accounts.oauth2){
        clearInterval(iv);
        tokenRef.current=window.google.accounts.oauth2.initTokenClient({
          client_id:CLIENT_ID,scope:SCOPES,
          callback:function(resp){if(resp.error){toast("Drive hatası");return}setDriveToken(resp.access_token);toast("Drive bağlandı ✓")}
        });
      }
    },300);
    return function(){clearInterval(iv)};
  },[]);

  useEffect(function(){
    var last=LS.get("price_ts",0);
    if(Date.now()-last>30*60*1000){
      fetchPrices().then(function(res){
        var np={};if(res.usd)np.usd=res.usd;if(res.eur)np.eur=res.eur;if(res.gold_gram)np.gold_gram=res.gold_gram;
        upd(function(s){s.prices=Object.assign({},s.prices,np)});
        LS.set("cached_prices",np);LS.set("price_info",new Date().toLocaleTimeString("tr-TR"));LS.set("price_ts",Date.now());
      }).catch(function(){var c=LS.get("cached_prices",null);if(c)upd(function(s){s.prices=Object.assign({},s.prices,c)})});
    }
  },[]);

  function connectDrive(){if(tokenRef.current)tokenRef.current.requestAccessToken()}
  function saveDrive(){
    if(!driveToken){connectDrive();return}setDStatus("saving");
    dSave(driveToken,state).then(function(){var t=new Date().toLocaleTimeString("tr-TR");setLastSync(t);LS.set("last_sync",t);setDStatus("ok");toast("Drive'a kaydedildi ✓")}).catch(function(){setDStatus("err");toast("Kaydetme hatası")});
  }
  function loadDrive(){
    if(!driveToken){connectDrive();return}setDStatus("loading");
    dLoad(driveToken).then(function(data){if(data){setState(Object.assign(mkDefault(),data));toast("Drive'dan yüklendi ✓")}else toast("Drive'da kayıt yok");setDStatus("ok")}).catch(function(){setDStatus("err");toast("Yükleme hatası")});
  }
  function reqNotif(){if("Notification" in window)Notification.requestPermission().then(function(r){if(r==="granted")toast("Bildirimler aktif 🔔")})}

  function togglePay(mk,id){
    upd(function(s){var md=Object.assign({},s.monthlyData[mk]||{});var pays=Object.assign({},md.payments||{});pays[id]=!pays[id];md.payments=pays;s.monthlyData=Object.assign({},s.monthlyData);s.monthlyData[mk]=md});
    toast("Ödeme güncellendi ✓");
  }
  function toggleInc(mk,id){
    upd(function(s){var md=Object.assign({},s.monthlyData[mk]||{});var ic=Object.assign({},md.incomeCollected||{});ic[id]=!ic[id];md.incomeCollected=ic;s.monthlyData=Object.assign({},s.monthlyData);s.monthlyData[mk]=md});
    toast("Gelir güncellendi ✓");
  }

  function getTodayDue(){
    var k=mkey(CY,CM),pays=((state.monthlyData[k]||{}).payments)||{},due=[];
    state.expenseItems.filter(function(i){return i.active&&i.dueDay===CD&&!pays[i.id]}).forEach(function(i){due.push(Object.assign({},i,{mk:k}))});
    state.creditCards.forEach(function(c){if(c.dueDay===CD)due.push({id:c.id,label:c.label+" Son Ödeme",mk:k,isCard:true});if(c.cutDay===CD)due.push({id:"cut_"+c.id,label:c.label+" Hesap Kesim",mk:k,isCard:true,isCut:true})});
    return due;
  }
  function getTodayInc(){var k=mkey(CY,CM),ic=((state.monthlyData[k]||{}).incomeCollected)||{};return state.incomeItems.filter(function(i){return i.active&&i.incomeDay===CD&&!ic[i.id]})}

  var cum=0;
  var forecast=[];
  for(var m=0;m<12;m++){var inc=mIncome(state,CY,m),exp=mExpense(state,CY,m);cum+=inc-exp;forecast.push({m:m,inc:inc,exp:exp,net:inc-exp,cum:cum})}

  var due=getTodayDue(),tInc=getTodayInc();
  var tab=state.activeTab;
  function setTab(t){upd(function(s){s.activeTab=t})}

  var TABS=[{id:"dashboard",icon:"◉",label:"Özet"},{id:"income",icon:"↑",label:"Gelirler"},{id:"expenses",icon:"↓",label:"Giderler"},{id:"payments",icon:"✓",label:"Ödemeler"},{id:"cards",icon:"▣",label:"Kartlar"},{id:"portfolio",icon:"📊",label:"Portföy"},{id:"assets",icon:"◈",label:"Varlıklar"},{id:"forecast",icon:"⤴",label:"Projeksiyon"},{id:"budgets",icon:"◎",label:"Bütçeler"}];

  return e("div",{style:{minHeight:"100vh",background:"#0f0f13",color:"#e8e8e8"}},
    e("header",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 13px",background:"rgba(255,255,255,.04)",borderBottom:"1px solid rgba(255,255,255,.08)",position:"sticky",top:0,zIndex:100,flexWrap:"wrap",gap:5}},
      e("div",{style:{display:"flex",alignItems:"center",gap:9}},
        e("div",{style:{width:34,height:34,borderRadius:9,background:"linear-gradient(135deg,#e9c46a,#f4a261)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,fontWeight:900,color:"#0f0f13"}},"₺"),
        e("div",null,e("div",{style:{fontWeight:800,fontSize:13}},"Bütçe Defterim"),e("div",{style:{fontSize:9,color:"#888"}},CY+" · Kişisel Finans"))
      ),
      e("div",{style:{display:"flex",alignItems:"center",gap:4,flexWrap:"wrap"}},
        tInc.length>0&&e("div",{style:{background:"rgba(42,157,143,.2)",border:"1px solid rgba(42,157,143,.4)",color:"#2a9d8f",padding:"3px 7px",borderRadius:16,fontSize:10,cursor:"pointer",fontWeight:600},onClick:function(){setTab("payments")}},"💰 "+tInc.length),
        due.length>0&&e("div",{style:{background:"rgba(230,57,70,.25)",border:"1px solid rgba(230,57,70,.5)",color:"#ff8a80",padding:"3px 7px",borderRadius:16,fontSize:10,cursor:"pointer",fontWeight:600},onClick:function(){setTab("payments")}},"🔔 "+due.length),
        Notification.permission!=="granted"&&hbtn("rgba(233,196,106,.12)","#e9c46a","rgba(233,196,106,.35)","🔔",reqNotif),
        !driveToken
          ?hbtn("rgba(66,133,244,.2)","#4285f4","rgba(66,133,244,.4)","☁ Drive",connectDrive)
          :e("div",{style:{display:"flex",gap:3}},
            hbtn("rgba(42,157,143,.2)","#2a9d8f","rgba(42,157,143,.4)",dStatus==="saving"?"⏳":"↑ Kaydet",saveDrive),
            hbtn("rgba(233,196,106,.12)","#e9c46a","rgba(233,196,106,.3)",dStatus==="loading"?"⏳":"↓ Yükle",loadDrive)
          )
      )
    ),
    driveToken&&e("div",{style:{fontSize:10,padding:"4px 13px",background:"rgba(42,157,143,.07)",borderBottom:"1px solid rgba(42,157,143,.12)",color:"#2a9d8f"}},"☁ Drive bağlı"+(lastSync?" · "+lastSync:"")),
    e("nav",{style:{display:"flex",overflowX:"auto",gap:1,padding:"4px 9px",background:"rgba(255,255,255,.02)",borderBottom:"1px solid rgba(255,255,255,.06)"}},
      TABS.map(function(t){return e("button",{key:t.id,style:{display:"flex",alignItems:"center",gap:3,padding:"6px 9px",borderRadius:6,border:"none",background:tab===t.id?"rgba(233,196,106,.15)":"transparent",color:tab===t.id?"#e9c46a":"#888",cursor:"pointer",fontSize:11,fontWeight:tab===t.id?700:500,whiteSpace:"nowrap"},onClick:function(){setTab(t.id)}},t.icon," ",t.label)})
    ),
    e("main",{style:{padding:"13px 11px",maxWidth:960,margin:"0 auto"}},
      tab==="dashboard"&&e(Dashboard,{state:state,forecast:forecast,due:due,todayInc:tInc,togglePay:togglePay,toggleInc:toggleInc}),
      tab==="income"   &&e(IncomeTab,{state:state,upd:upd,toast:toast}),
      tab==="expenses" &&e(ExpensesTab,{state:state,upd:upd,toast:toast}),
      tab==="payments" &&e(PaymentsTab,{state:state,togglePay:togglePay,toggleInc:toggleInc}),
      tab==="cards"    &&e(CardsTab,{state:state,upd:upd,toast:toast}),
      tab==="portfolio"&&e(PortfolioTab,{state:state,upd:upd,toast:toast}),
      tab==="assets"   &&e(AssetsTab,{state:state,upd:upd}),
      tab==="forecast" &&e(ForecastTab,{forecast:forecast}),
      tab==="budgets"  &&e(BudgetsTab,{state:state,upd:upd,toast:toast})
    ),
    toastMsg&&e("div",{style:{position:"fixed",bottom:15,right:15,zIndex:9999,padding:"8px 13px",borderRadius:9,fontWeight:700,color:"#fff",fontSize:12,background:"#2a9d8f",boxShadow:"0 5px 18px rgba(0,0,0,.4)"}},toastMsg)
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
