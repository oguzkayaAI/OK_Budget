// ── Hesaplama fonksiyonları
function mkey(y,m){ return y+"-"+m; }

function portfolioVal(portfolio,prices){
  return (portfolio||[]).reduce((sum,pos)=>{
    if(!pos.active) return sum;
    if(pos.type.startsWith("gold_")){
      return sum + pos.quantity*(GOLD_W[pos.type]||1)*prices.gold_gram;
    }
    if(pos.type==="deposit_try"){
      return sum + pos.principal*(1+(pos.rate||0)/100*(pos.days||365)/365);
    }
    if(pos.type==="deposit_usd"){
      return sum + pos.principal*(1+(pos.rate||0)/100*(pos.days||365)/365)*prices.usd;
    }
    if(pos.type==="deposit_eur"){
      return sum + pos.principal*(1+(pos.rate||0)/100*(pos.days||365)/365)*prices.eur;
    }
    return sum + (pos.currentValue||pos.principal||0);
  },0);
}

function netWorth(state){
  const a=state.assets, p=state.prices;
  return a.cash_try + a.cash_usd*p.usd + a.cash_eur*p.eur + a.other
       + portfolioVal(state.portfolio,p);
}

function monthIncome(state,y,m){
  const ov=(state.monthlyData[mkey(y,m)]||{}).incomeOverrides||{};
  return state.incomeItems.filter(i=>i.active)
    .reduce((s,i)=>s+(ov[i.id]!==undefined?ov[i.id]:i.amount),0);
}

function monthExpense(state,y,m){
  const ov=(state.monthlyData[mkey(y,m)]||{}).expenseOverrides||{};
  const bt=(state.budgets||[]).filter(b=>b.year===y&&b.month===m)
    .reduce((s,b)=>s+b.amount,0);
  return state.expenseItems.filter(i=>i.active)
    .reduce((s,i)=>s+(ov[i.id]!==undefined?ov[i.id]:i.amount),0)+bt;
}

function fmt(n){
  if(n==null||n===undefined) return "—";
  return new Intl.NumberFormat("tr-TR",{style:"currency",currency:"TRY",maximumFractionDigits:0}).format(n);
}

function daysDiff(dateStr){
  if(!dateStr) return null;
  return Math.round((new Date(dateStr)-NOW)/(864e5));
}

function daysLeft(day){
  return ((day-CD+31)%31)||31;
}

// ── Google Drive
async function driveFindFile(token){
  const r=await fetch(
    "https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name='"+FILE_NAME+"'&fields=files(id)",
    {headers:{Authorization:"Bearer "+token}}
  );
  const d=await r.json();
  return (d.files||[])[0]||null;
}

async function driveSave(token,data){
  const body=JSON.stringify(data);
  const ex=await driveFindFile(token);
  if(ex){
    await fetch("https://www.googleapis.com/upload/drive/v3/files/"+ex.id+"?uploadType=media",
      {method:"PATCH",headers:{Authorization:"Bearer "+token,"Content-Type":"application/json"},body});
  } else {
    const m=await fetch("https://www.googleapis.com/drive/v3/files?fields=id",
      {method:"POST",headers:{Authorization:"Bearer "+token,"Content-Type":"application/json"},
       body:JSON.stringify({name:FILE_NAME,parents:["appDataFolder"]})});
    const {id}=await m.json();
    await fetch("https://www.googleapis.com/upload/drive/v3/files/"+id+"?uploadType=media",
      {method:"PATCH",headers:{Authorization:"Bearer "+token,"Content-Type":"application/json"},body});
  }
}

async function driveLoad(token){
  const f=await driveFindFile(token);
  if(!f) return null;
  const r=await fetch("https://www.googleapis.com/drive/v3/files/"+f.id+"?alt=media",
    {headers:{Authorization:"Bearer "+token}});
  return r.json();
}

// ── Canlı fiyat
async function fetchPrices(){
  // Döviz — önce frankfurter, sonra open.er-api
  let usd,eur;
  try{
    const r=await fetch("https://api.frankfurter.app/latest?from=USD&to=TRY,EUR");
    const d=await r.json();
    usd=d.rates.TRY;
    eur=(1/d.rates.EUR)*usd;
  } catch(_){
    const r=await fetch("https://open.er-api.com/v6/latest/USD");
    const d=await r.json();
    usd=d.rates.TRY;
    eur=(1/d.rates.EUR)*usd;
  }
  // Altın — gold-api.com
  let gold_gram;
  try{
    const r=await fetch("https://gold-api.com/price/XAU");
    const d=await r.json();
    gold_gram=Math.round(d.price*usd/31.1035);
  } catch(_){
    const cached=LS.get("cached_prices",null);
    gold_gram=cached?cached.gold_gram:null;
  }
  return {
    usd:   Math.round(usd*100)/100,
    eur:   Math.round(eur*100)/100,
    gold_gram
  };
}

// ── Bildirimler
function notify(title,body){
  if(Notification.permission==="granted") new Notification(title,{body});
}

function checkNotifs(state){
  const k=mkey(CY,CM);
  const pay=(state.monthlyData[k]||{}).payments||{};
  const ic=(state.monthlyData[k]||{}).incomeCollected||{};
  state.expenseItems.filter(i=>i.active&&i.dueDay===CD&&!pay[i.id])
    .forEach(i=>notify("💸 Ödeme Vadesi!",i.label+" · "+fmt(i.amount)));
  state.incomeItems.filter(i=>i.active&&i.incomeDay===CD&&!ic[i.id])
    .forEach(i=>notify("💰 Gelir Günü!",i.label+" · "+fmt(i.amount)));
  state.creditCards.forEach(c=>{
    if(c.cutDay===CD) notify("✂️ Hesap Kesim!",c.label+" bugün kesiliyor");
    if(c.dueDay===CD) notify("💳 Son Ödeme!",c.label+" son ödeme günü bugün");
    if(daysLeft(c.dueDay)===3) notify("⚠️ Kart Uyarısı",c.label+" için 3 gün kaldı");
  });
  (state.portfolio||[]).filter(p=>p.active&&p.maturityDate).forEach(pos=>{
    const d=daysDiff(pos.maturityDate);
    if(d===0) notify("🏦 Vade Bugün!",pos.label+" vadesi bugün");
    if(d===1) notify("⚠️ Yarın Vade!",pos.label+" yarın vadesi doluyor");
    if(d===3) notify("🔔 Vade Yaklaşıyor",pos.label+" vadesine 3 gün kaldı");
  });
}

// ── Shared components
function KCard({label,value,color,icon}){
  return (
    <div style={{...C.kcard,borderTop:"3px solid "+color}}>
      <div style={{fontSize:18,marginBottom:6,color}}>{icon}</div>
      <div style={{fontSize:16,fontWeight:800}}>{value}</div>
      <div style={{fontSize:10,color:"#888",marginTop:3}}>{label}</div>
    </div>
  );
}

function MiniBar({data}){
  const max=Math.max(...data.map(r=>Math.max(r.inc,r.exp)),1);
  return (
    <div style={C.mb}>
      {data.map((row,i)=>(
        <div key={i} style={C.mbg}>
          <div style={{flex:1,display:"flex",alignItems:"flex-end",gap:1}}>
            <div style={{flex:1,height:Math.round((row.inc/max)*52)+"px",background:"#2a9d8f",borderRadius:"2px 2px 0 0",minHeight:2}}/>
            <div style={{flex:1,height:Math.round((row.exp/max)*52)+"px",background:"#e63946",borderRadius:"2px 2px 0 0",minHeight:2}}/>
          </div>
          <div style={{fontSize:8,color:"#888",marginTop:2}}>{MONTHS[i]}</div>
        </div>
      ))}
    </div>
  );
}

// ══ DASHBOARD ══════════════════════════════════
function Dashboard({state,forecast,due,todayInc,togglePay,toggleInc}){
  const p=state.prices;
  const tm=forecast[CM]||{inc:0,exp:0,net:0};
  const nw=netWorth(state);
  const pv=portfolioVal(state.portfolio,p);
  const upcoming=(state.portfolio||[])
    .filter(pos=>pos.active&&pos.maturityDate&&daysDiff(pos.maturityDate)>=0&&daysDiff(pos.maturityDate)<=3)
    .sort((a,b)=>daysDiff(a.maturityDate)-daysDiff(b.maturityDate));

  return (
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <div style={{fontSize:18,fontWeight:800,letterSpacing:"-0.5px"}}>Bu Ay · {FULL_MONTHS[CM]} {CY}</div>

      <div style={C.kgrid}>
        <KCard label="Aylık Gelir"    value={fmt(tm.inc)} color="#2a9d8f" icon="↑"/>
        <KCard label="Aylık Gider"    value={fmt(tm.exp)} color="#e63946" icon="↓"/>
        <KCard label="Net Tasarruf"   value={fmt(tm.net)} color={tm.net>=0?"#2a9d8f":"#e63946"} icon="="/>
        <KCard label="Toplam Varlık"  value={fmt(nw)}     color="#e9c46a" icon="◈"/>
        <KCard label="Portföy"        value={fmt(pv)}     color="#f4a261" icon="📊"/>
      </div>

      {upcoming.length>0&&(
        <div style={{...C.card,borderColor:"rgba(230,57,70,.3)"}}>
          <div style={C.ctitle}>🔔 Yaklaşan Yatırım Vadeleri</div>
          {upcoming.map(pos=>{
            const d=daysDiff(pos.maturityDate);
            return (
              <div key={pos.id} style={C.drow}>
                <div>
                  <span style={{fontWeight:600}}>{pos.label}</span>
                  {d===0&&<span style={C.utag}>BUGÜN</span>}
                </div>
                <span style={{color:"#ff8a80",fontWeight:700}}>{d===0?"Bugün":d+" gün"}</span>
              </div>
            );
          })}
        </div>
      )}

      {todayInc.length>0&&(
        <div style={C.card}>
          <div style={C.ctitle}>💰 Bugün Gelmesi Beklenen Gelirler</div>
          {todayInc.map(item=>{
            const mk=mkey(CY,CM);
            const col=!!((state.monthlyData[mk]||{}).incomeCollected||{})[item.id];
            return (
              <div key={item.id} style={C.drow}>
                <div>
                  <div style={{fontWeight:600}}>{item.label}</div>
                  <div style={{fontSize:11,color:"#e9c46a"}}>{fmt(item.amount)}</div>
                </div>
                <button style={{...C.pbtn,background:col?"#2a9d8f":"#e9c46a",color:"#0f0f13"}}
                  onClick={()=>toggleInc(mk,item.id)}>
                  {col?"✓ Geldi":"Geldi mi?"}
                </button>
              </div>
            );
          })}
        </div>
      )}

      {due.length>0&&(
        <div style={C.card}>
          <div style={C.ctitle}>🔔 Bugün Yapılacak Ödemeler</div>
          {due.map(item=>(
            <div key={item.id} style={C.drow}>
              <div>
                <div style={{fontWeight:600}}>{item.label}</div>
                {!item.isCard&&<div style={{fontSize:11,color:"#e9c46a"}}>{fmt(item.amount)}</div>}
              </div>
              {!item.isCut&&(
                <button style={{...C.pbtn,background:"#e63946"}}
                  onClick={()=>togglePay(item.mk,item.id)}>✓ Ödedim</button>
              )}
            </div>
          ))}
        </div>
      )}

      <div style={C.card}>
        <div style={C.ctitle}>Yıl Boyu Birikim</div>
        <MiniBar data={forecast}/>
      </div>

      <div style={C.r2}>
        <div style={C.card}>
          <div style={C.ctitle}>Gelir Kalemleri</div>
          {state.incomeItems.filter(i=>i.active).map(i=>(
            <div key={i.id} style={C.irow}>
              <span style={{color:"#ccc"}}>{i.label}{i.incomeDay===CD&&<span style={C.tag}>BUGÜN</span>}</span>
              <span style={{fontWeight:700,color:"#2a9d8f"}}>{fmt(i.amount)}</span>
            </div>
          ))}
        </div>
        <div style={C.card}>
          <div style={C.ctitle}>Gider Kalemleri</div>
          {state.expenseItems.filter(i=>i.active).map(i=>(
            <div key={i.id} style={C.irow}>
              <span style={{color:"#ccc"}}>{i.label}{i.dueDay===CD&&<span style={C.tag}>BUGÜN</span>}</span>
              <span style={{fontWeight:700,color:"#e63946"}}>{fmt(i.amount)}</span>
            </div>

// ══ PORTFÖY ════════════════════════════════════
function PortfolioTab({state,upd,toast}){
  const prices=state.prices;
  const port=state.portfolio||[];
  const [form,setForm]=useState({label:"",type:"deposit_try",principal:"",quantity:"",rate:"",days:"365",startDate:TODAY,maturityDate:"",currentValue:""});

  const isGold=form.type.startsWith("gold_");
  const isDep=form.type.startsWith("deposit_");
  const isFlex=["fund","stock","crypto","other"].includes(form.type);

  function calcMat(){
    if(form.startDate&&form.days){
      const d=new Date(form.startDate);
      d.setDate(d.getDate()+parseInt(form.days));
      setForm(f=>({...f,maturityDate:d.toISOString().slice(0,10)}));
    }
  }

  function posValue(pos){
    if(pos.type.startsWith("gold_")) return pos.quantity*(GOLD_W[pos.type]||1)*prices.gold_gram;
    if(pos.type==="deposit_try") return pos.principal*(1+(pos.rate||0)/100*(pos.days||365)/365);
    if(pos.type==="deposit_usd") return pos.principal*(1+(pos.rate||0)/100*(pos.days||365)/365)*prices.usd;
    if(pos.type==="deposit_eur") return pos.principal*(1+(pos.rate||0)/100*(pos.days||365)/365)*prices.eur;
    return pos.currentValue||pos.principal||0;
  }

  const totalVal=port.filter(p=>p.active).reduce((s,p)=>s+posValue(p),0);
  const upcoming=port.filter(p=>p.active&&p.maturityDate&&daysDiff(p.maturityDate)>=0&&daysDiff(p.maturityDate)<=7)
    .sort((a,b)=>daysDiff(a.maturityDate)-daysDiff(b.maturityDate));

  return (
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      <div style={{fontSize:18,fontWeight:800}}>Yatırım Portföyü</div>
      <div style={C.kgrid}>
        <KCard label="Toplam Portföy" value={fmt(totalVal)} color="#e9c46a" icon="📊"/>
      </div>

      {upcoming.length>0&&(
        <div style={{...C.card,borderColor:"rgba(230,57,70,.3)"}}>
          <div style={C.ctitle}>🔔 Yaklaşan Vadeler</div>
          {upcoming.map(pos=>{
            const d=daysDiff(pos.maturityDate);
            return (
              <div key={pos.id} style={C.drow}>
                <div>
                  <span style={{fontWeight:600}}>{pos.label}</span>
                  {d===0&&<span style={C.utag}>BUGÜN</span>}
                </div>
                <span style={{color:"#ff8a80",fontWeight:700}}>{d===0?"Bugün":d+" gün"}</span>
              </div>
            );
          })}
        </div>
      )}

      {port.map(pos=>{
        const val=posValue(pos);
        const d=pos.maturityDate?daysDiff(pos.maturityDate):null;
        let bg="rgba(255,255,255,.03)";
        if(d!==null){ if(d===0) bg="rgba(230,57,70,.18)"; else if(d<=3) bg="rgba(230,57,70,.1)"; else if(d<=7) bg="rgba(233,196,106,.08)"; else bg="rgba(42,157,143,.07)"; }
        const interest=pos.type==="deposit_try"?pos.principal*(pos.rate||0)/100*(pos.days||365)/365:0;
        return (
          <div key={pos.id} style={{...C.card,background:bg}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div>
                <div style={{fontWeight:700,fontSize:14}}>
                  {pos.label}
                  {d===0&&<span style={C.utag}>VADE BUGÜN</span>}
                  {d===1&&<span style={C.utag}>YARIN VADE</span>}
                  {d!==null&&d>1&&d<=3&&<span style={C.utag}>{d+" GÜN"}</span>}
                </div>
                <div style={{fontSize:10,color:"#888"}}>{INV_TYPES[pos.type]||pos.type}</div>
              </div>
              <div style={{textAlign:"right"}}>

      const res=await fetchPrices();
      const newPrices={};
      if(res.usd)        newPrices.usd=res.usd;
      if(res.eur)        newPrices.eur=res.eur;

        <KCard label="Nakit & Banka"   value={fmt(cashVal)} color="#2a9d8f" icon="₺"/>
        <KCard label="Portföy"         value={fmt(portVal)} color="#f4a261" icon="📊"/>
      </div>

      <div style={{...C.card,borderColor:"rgba(233,196,106,.2)"}}>

        {offline&&<div style={{color:"#e9c46a",fontSize:11,marginBottom:7}}>📴 Çevrimdışı — son kayıtlı fiyatlar kullanılıyor</div>}
        {info&&!offline&&<div style={{color:"#555",fontSize:10,marginBottom:10}}>Son güncelleme: {info} · gold-api.com & frankfurter.app</div>}
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(130px,1fr))",gap:8}}>

// ══ ANA UYGULAMA ═══════════════════════════════
function App(){
  const [state,setState] = useState(()=>{
    const saved=LS.get("butce_v5",null);
    return saved ? {...mkDefault(),...saved} : mkDefault();
  });
  const [toastMsg,setToastMsg] = useState(null);
  const [driveToken,setDriveToken] = useState(null);
  const [driveStatus,setDriveStatus] = useState("idle");
  const [lastSync,setLastSync] = useState(LS.get("last_sync",""));
  const tokenRef = useRef(null);

  useEffect(()=>{ LS.set("butce_v5",state); },[state]);

  useEffect(()=>{
    if(toastMsg){ const t=setTimeout(()=>setToastMsg(null),3000); return ()=>clearTimeout(t); }
  },[toastMsg]);

  const toast = (msg) => setToastMsg(msg);
  const upd = useCallback((fn)=>setState(s=>{ const n={...s}; fn(n); return n; }),[]);

  // Google Drive init
  useEffect(()=>{
    const iv=setInterval(()=>{
      if(window.google&&window.google.accounts&&window.google.accounts.oauth2){
        clearInterval(iv);
        tokenRef.current=window.google.accounts.oauth2.initTokenClient({
          client_id:CLIENT_ID, scope:SCOPES,
          callback:(resp)=>{
            if(resp.error){ toast("Drive bağlantı hatası"); return; }
            setDriveToken(resp.access_token);
            toast("Drive'a bağlandı ✓");
          }
        });
      }
    },300);
    return ()=>clearInterval(iv);
  },[]);

  // Bildirim kontrolü
  useEffect(()=>{ checkNotifs(state); },[]);

  function connectDrive(){ if(tokenRef.current) tokenRef.current.requestAccessToken(); }

  async function saveDrive(){
    if(!driveToken){ connectDrive(); return; }
    setDriveStatus("saving");
    try{
      await driveSave(driveToken,state);
      const t=new Date().toLocaleTimeString("tr-TR");
      setLastSync(t); LS.set("last_sync",t);
      setDriveStatus("ok"); toast("Drive'a kaydedildi ✓");
    } catch(e){ setDriveStatus("err"); toast("Kaydetme hatası"); }
  }

  async function loadDrive(){
    if(!driveToken){ connectDrive(); return; }
    setDriveStatus("loading");
    try{
      const data=await driveLoad(driveToken);
      if(data){ setState({...mkDefault(),...data}); toast("Drive'dan yüklendi ✓"); }
      else toast("Drive'da kayıt bulunamadı");
      setDriveStatus("ok");
    } catch(e){ setDriveStatus("err"); toast("Yükleme hatası"); }
  }

  async function reqNotif(){
    if("Notification" in window){
      const r=await Notification.requestPermission();
      if(r==="granted"){ toast("Bildirimler aktif 🔔"); checkNotifs(state); }
    }
  }

  function togglePay(mk,itemId){
    upd(s=>{
      const md={...(s.monthlyData[mk]||{})};
      const pays={...(md.payments||{})};
      pays[itemId]=!pays[itemId];
      md.payments=pays;
      s.monthlyData={...s.monthlyData,[mk]:md};
    });
    toast("Ödeme güncellendi ✓");
  }

  function toggleInc(mk,itemId){
    upd(s=>{
      const md={...(s.monthlyData[mk]||{})};
      const ic={...(md.incomeCollected||{})};
      ic[itemId]=!ic[itemId];
      md.incomeCollected=ic;
      s.monthlyData={...s.monthlyData,[mk]:md};
    });
    toast("Gelir güncellendi ✓");
  }

  // Bugünkü ödemeler
  function todayDue(){
    const k=mkey(CY,CM);
    const pays=((state.monthlyData[k]||{}).payments)||{};
    const due=[];
    state.expenseItems.filter(i=>i.active&&i.dueDay===CD&&!pays[i.id])
      .forEach(i=>due.push({...i,mk:k}));
    state.creditCards.forEach(c=>{
      if(c.dueDay===CD) due.push({id:c.id,label:c.label+" Son Ödeme",mk:k,isCard:true});
      if(c.cutDay===CD) due.push({id:"cut_"+c.id,label:c.label+" Hesap Kesim",mk:k,isCard:true,isCut:true});
    });
    return due;
  }

  function todayInc(){
    const k=mkey(CY,CM);
    const ic=((state.monthlyData[k]||{}).incomeCollected)||{};
    return state.incomeItems.filter(i=>i.active&&i.incomeDay===CD&&!ic[i.id]);
  }

  // Forecast
  let cum=0;
  const forecast=Array.from({length:12},(_,m)=>{
    const inc=monthIncome(state,CY,m);
    const exp=monthExpense(state,CY,m);
    cum+=inc-exp;
    return {m,inc,exp,net:inc-exp,cum};
  });

  const due=todayDue();
  const tInc=todayInc();
  const tab=state.activeTab;
  const setTab=t=>upd(s=>{s.activeTab=t;});

  const TABS=[
    {id:"dashboard",icon:"◉",label:"Özet"},
    {id:"income",icon:"↑",label:"Gelirler"},
    {id:"expenses",icon:"↓",label:"Giderler"},
    {id:"payments",icon:"✓",label:"Ödemeler"},
    {id:"cards",icon:"▣",label:"Kartlar"},
    {id:"portfolio",icon:"📊",label:"Portföy"},
    {id:"assets",icon:"◈",label:"Varlıklar"},
    {id:"forecast",icon:"⤴",label:"Projeksiyon"},
    {id:"budgets",icon:"◎",label:"Bütçeler"},
  ];

  return (
    <div style={C.root}>
      <header style={C.header}>
        <div style={C.hL}>
          <div style={C.logo}>₺</div>
          <div>
            <div style={{fontWeight:800,fontSize:15,letterSpacing:"-0.3px"}}>Bütçe Defterim</div>
            <div style={{fontSize:10,color:"#888"}}>{CY} · Kişisel Finans</div>
          </div>
        </div>
        <div style={C.hR}>
          {tInc.length>0&&<div style={badge("rgba(42,157,143,.2)","rgba(42,157,143,.4)","#2a9d8f")} onClick={()=>setTab("payments")}>💰 {tInc.length} gelir bugün</div>}
          {due.length>0&&<div style={badge("rgba(230,57,70,.25)","rgba(230,57,70,.5)","#ff8a80")} onClick={()=>setTab("payments")}>🔔 {due.length} ödeme bugün</div>}
          {Notification.permission!=="granted"&&<button style={btn("rgba(233,196,106,.15)","#e9c46a","rgba(233,196,106,.4)")} onClick={reqNotif}>🔔 Bildirimleri Aç</button>}
          {!driveToken
            ?<button style={btn("rgba(66,133,244,.2)","#4285f4","rgba(66,133,244,.4)")} onClick={connectDrive}>☁ Drive</button>
            :<>
              <button style={btn("rgba(42,157,143,.2)","#2a9d8f","rgba(42,157,143,.4)")} onClick={saveDrive}>
                {driveStatus==="saving"?"⏳":"↑ Kaydet"}
              </button>
              <button style={btn("rgba(233,196,106,.15)","#e9c46a","rgba(233,196,106,.3)")} onClick={loadDrive}>
                {driveStatus==="loading"?"⏳":"↓ Yükle"}
              </button>
            </>
          }
        </div>
      </header>

      {driveToken&&(
        <div style={C.syncBar}>
          <span>☁</span>
          <span>Drive bağlı{lastSync?" · Son kayıt: "+lastSync:" · Henüz kaydedilmedi"}</span>
          <span style={{marginLeft:"auto",color:"#444"}}>Sadece sizin Drive'ınızda</span>
        </div>
      )}

      <nav style={C.nav}>
        {TABS.map(t=>(
          <button key={t.id}
            style={{...{display:"flex",alignItems:"center",gap:5,padding:"7px 11px",borderRadius:8,border:"none",background:"transparent",color:"#888",cursor:"pointer",fontSize:12,fontWeight:500,whiteSpace:"nowrap"},
                   ...(tab===t.id?{background:"rgba(233,196,106,.15)",color:"#e9c46a",fontWeight:700}:{})}}
            onClick={()=>setTab(t.id)}>
            <span>{t.icon}</span><span>{t.label}</span>
          </button>
        ))}
      </nav>

      <main style={C.main}>
        {tab==="dashboard" &&<Dashboard state={state} forecast={forecast} due={due} todayInc={tInc} togglePay={togglePay} toggleInc={toggleInc}/>}
        {tab==="income"    &&<IncomeTab state={state} upd={upd} toast={toast}/>}
        {tab==="expenses"  &&<ExpensesTab state={state} upd={upd} toast={toast}/>}
        {tab==="payments"  &&<PaymentsTab state={state} togglePay={togglePay} toggleInc={toggleInc}/>}
        {tab==="cards"     &&<CardsTab state={state} upd={upd} toast={toast}/>}
        {tab==="portfolio" &&<PortfolioTab state={state} upd={upd} toast={toast}/>}
        {tab==="assets"    &&<AssetsTab state={state} upd={upd}/>}
        {tab==="forecast"  &&<ForecastTab forecast={forecast}/>}
        {tab==="budgets"   &&<BudgetsTab state={state} upd={upd} toast={toast}/>}
      </main>

      {toastMsg&&(
        <div style={{...C.toast,background:"#2a9d8f"}}>{toastMsg}</div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
