<!DOCTYPE html>

<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bütçe Defterim</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0f0f13;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#e8e8e8;font-size:14px}
input,select,button{font-family:inherit;outline:none}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

<body>
<div id="root"></div>
<script>
'use strict';
const e = React.createElement;
const {useState, useEffect, useCallback, useRef} = React;

// ── Config
const CLIENT_ID = "629470119329-cqv2csvgkcgbna6lh3vggdaii1uf2gcb.apps.googleusercontent.com";
const SCOPES    = "https://www.googleapis.com/auth/drive.appdata";
const FILE_NAME = "butce_v6.json";

// ── LocalStorage
const LS = {
  get:(k,d)=>{ try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch{return d} },
  set:(k,v)=>{ try{localStorage.setItem(k,JSON.stringify(v))}catch{} }
};

// ── Constants
const MONTHS      = ["Oca","Şub","Mar","Nis","May","Haz","Tem","Ağu","Eyl","Eki","Kas","Ara"];
const FULL_MONTHS = ["Ocak","Şubat","Mart","Nisan","Mayıs","Haziran","Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"];
const NOW = new Date();
const CY = NOW.getFullYear(), CM = NOW.getMonth(), CD = NOW.getDate();
const TODAY = NOW.toISOString().slice(0,10);

const GOLD_W = {gold_gram:1, gold_quarter:1.75, gold_half:3.5, gold_full:7};
const INV_TYPES = {gold_gram:"Gram Altın",gold_quarter:"Çeyrek Altın",gold_half:"Yarım Altın",gold_full:"Tam Altın",deposit_try:"Vadeli Mevduat (TL)",deposit_usd:"Vadeli Mevduat (USD)",deposit_eur:"Vadeli Mevduat (EUR)",fund:"Yatırım Fonu",stock:"Hisse",crypto:"Kripto",other:"Diğer"};
const INC_TYPES = {salary:"Maaş",rent_income:"Kira Geliri",interest:"Faiz",freelance:"Serbest",dividend:"Temettü",other_income:"Diğer"};
const EXP_TYPES = {fixed:"Sabit",variable:"Değişken",installment:"Taksit/Kredi",credit_card:"Kredi Kartı",rent:"Kira",subscription:"Abonelik",other_expense:"Diğer"};

function uid(){ return Math.random().toString(36).slice(2,9) }

function mkDefault(){
  return {
    incomeItems:[
      {id:uid(),label:"Maaş",type:"salary",amount:0,active:true,incomeDay:1},
      {id:uid(),label:"Kira Geliri",type:"rent_income",amount:0,active:true,incomeDay:5},
      {id:uid(),label:"Faiz Geliri",type:"interest",amount:0,active:true,incomeDay:10},
    ],
    expenseItems:[
      {id:uid(),label:"Kira",type:"fixed",amount:0,active:true,dueDay:1,remaining:0},
      {id:uid(),label:"Kredi",type:"installment",amount:0,active:true,dueDay:15,remaining:0},
      {id:uid(),label:"Kredi Kartı",type:"credit_card",amount:0,active:true,dueDay:10,remaining:0},
    ],
    creditCards:[{id:uid(),label:"Kart 1",limit:0,cutDay:25,dueDay:10,color:"#e63946"}],
    assets:{cash_try:0,cash_usd:0,cash_eur:0,other:0},
    portfolio:[],
    budgets:[],
    monthlyData:{},
    prices:{gold_gram:3200,usd:38,eur:42},
    activeTab:"dashboard",
  };
}

// ── Helpers
function mkey(y,m){ return y+"-"+m }
function fmt(n){ if(n==null)return"—"; return new Intl.NumberFormat("tr-TR",{style:"currency",currency:"TRY",maximumFractionDigits:0}).format(n) }
function dLeft(day){ return ((day-CD+31)%31)||31 }
function dDiff(ds){ if(!ds)return null; return Math.round((new Date(ds)-NOW)/864e5) }

function posVal(pos, prices){
  if(pos.type.startsWith("gold_")) return pos.quantity*(GOLD_W[pos.type]||1)*prices.gold_gram;
  if(pos.type==="deposit_try") return pos.principal*(1+(pos.rate||0)/100*(pos.days||365)/365);
  if(pos.type==="deposit_usd") return pos.principal*(1+(pos.rate||0)/100*(pos.days||365)/365)*prices.usd;
  if(pos.type==="deposit_eur") return pos.principal*(1+(pos.rate||0)/100*(pos.days||365)/365)*prices.eur;
  return pos.currentValue||pos.principal||0;
}
function portVal(portfolio, prices){ return (portfolio||[]).filter(p=>p.active).reduce((s,p)=>s+posVal(p,prices),0) }
function nWorth(state){ const a=state.assets,p=state.prices; return a.cash_try+a.cash_usd*p.usd+a.cash_eur*p.eur+a.other+portVal(state.portfolio,p) }
function mIncome(state,y,m){ const ov=((state.monthlyData[mkey(y,m)]||{}).incomeOverrides)||{}; return state.incomeItems.filter(i=>i.active).reduce((s,i)=>s+(ov[i.id]!=null?ov[i.id]:i.amount),0) }
function mExpense(state,y,m){ const ov=((state.monthlyData[mkey(y,m)]||{}).expenseOverrides)||{}; const bt=(state.budgets||[]).filter(b=>b.year===y&&b.month===m).reduce((s,b)=>s+b.amount,0); return state.expenseItems.filter(i=>i.active).reduce((s,i)=>s+(ov[i.id]!=null?ov[i.id]:i.amount),0)+bt }

// ── Drive
async function dFind(t){ const r=await fetch("https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name%3D'"+FILE_NAME+"'&fields=files(id)",{headers:{Authorization:"Bearer "+t}}); const d=await r.json(); return (d.files||[])[0]||null }
async function dSave(t,data){ const body=JSON.stringify(data); const ex=await dFind(t); if(ex){ await fetch("https://www.googleapis.com/upload/drive/v3/files/"+ex.id+"?uploadType=media",{method:"PATCH",headers:{Authorization:"Bearer "+t,"Content-Type":"application/json"},body}) } else { const m=await fetch("https://www.googleapis.com/drive/v3/files?fields=id",{method:"POST",headers:{Authorization:"Bearer "+t,"Content-Type":"application/json"},body:JSON.stringify({name:FILE_NAME,parents:["appDataFolder"]})}); const {id}=await m.json(); await fetch("https://www.googleapis.com/upload/drive/v3/files/"+id+"?uploadType=media",{method:"PATCH",headers:{Authorization:"Bearer "+t,"Content-Type":"application/json"},body}) } }
async function dLoad(t){ const f=await dFind(t); if(!f)return null; const r=await fetch("https://www.googleapis.com/drive/v3/files/"+f.id+"?alt=media",{headers:{Authorization:"Bearer "+t}}); return r.json() }

// ── Live prices
async function fetchPrices(){
  let usd,eur;
  try{ const r=await fetch("https://api.frankfurter.app/latest?from=USD&to=TRY,EUR"); const d=await r.json(); usd=d.rates.TRY; eur=(1/d.rates.EUR)*usd }
  catch{ const r=await fetch("https://open.er-api.com/v6/latest/USD"); const d=await r.json(); usd=d.rates.TRY; eur=(1/d.rates.EUR)*usd }
  let gold_gram;
  try{ const r=await fetch("https://gold-api.com/price/XAU"); const d=await r.json(); gold_gram=Math.round(d.price*usd/31.1035) }
  catch{ const c=LS.get("cached_prices",null); gold_gram=c?c.gold_gram:null }
  return {usd:Math.round(usd*100)/100, eur:Math.round(eur*100)/100, gold_gram}
}

// ── Notifications
function notify(title,body){ if(Notification.permission==="granted") new Notification(title,{body}) }
function checkNotifs(state){
  const k=mkey(CY,CM);
  const pays=((state.monthlyData[k]||{}).payments)||{};
  const ic=((state.monthlyData[k]||{}).incomeCollected)||{};
  state.expenseItems.filter(i=>i.active&&i.dueDay===CD&&!pays[i.id]).forEach(i=>notify("💸 Ödeme Vadesi!",i.label+" · "+fmt(i.amount)));
  state.incomeItems.filter(i=>i.active&&i.incomeDay===CD&&!ic[i.id]).forEach(i=>notify("💰 Gelir Günü!",i.label+" · "+fmt(i.amount)));
  state.creditCards.forEach(c=>{ if(c.cutDay===CD)notify("✂️ Hesap Kesim!",c.label); if(c.dueDay===CD)notify("💳 Son Ödeme!",c.label); if(dLeft(c.dueDay)===3)notify("⚠️ Kart Uyarısı",c.label+" için 3 gün kaldı") });
  (state.portfolio||[]).filter(p=>p.active&&p.maturityDate).forEach(pos=>{ const d=dDiff(pos.maturityDate); if(d===0)notify("🏦 Vade Bugün!",pos.label); if(d===1)notify("⏰ Yarın Vade!",pos.label); if(d===3)notify("🔔 3 Gün Kaldı",pos.label) });
}

// ── Styles (plain objects, no JSX)
const S = {
  card: {background:"rgba(255,255,255,.05)",borderRadius:14,padding:"14px 16px",border:"1px solid rgba(255,255,255,.07)",marginBottom:12},
  ctitle: {fontSize:11,fontWeight:700,color:"#aaa",marginBottom:10,textTransform:"uppercase",letterSpacing:"0.5px"},
  inp: {flex:1,minWidth:100,padding:"8px 10px",borderRadius:8,background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.12)",color:"#f0f0f0",fontSize:12},
  sel: {flex:1,minWidth:120,padding:"8px 10px",borderRadius:8,background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.12)",color:"#f0f0f0",fontSize:12},
  addbtn: {padding:"8px 14px",borderRadius:8,background:"linear-gradient(135deg,#e9c46a,#f4a261)",border:"none",color:"#0f0f13",fontWeight:800,cursor:"pointer",fontSize:12,flexShrink:0},
  delbtn: {background:"rgba(230,57,70,.2)",border:"none",color:"#e63946",width:26,height:26,borderRadius:6,cursor:"pointer",fontSize:11,flexShrink:0},
  pbtn: (bg,fg) => ({padding:"6px 12px",borderRadius:7,border:"none",background:bg,color:fg||"#fff",fontWeight:700,cursor:"pointer",fontSize:11,whiteSpace:"nowrap"}),
  prow: (bg) => ({display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 12px",borderRadius:10,marginBottom:6,background:bg||"rgba(255,255,255,.03)"}),
  lrow: {display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid rgba(255,255,255,.06)"},
  irow: {display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid rgba(255,255,255,.05)"},
  ainp: {width:82,padding:"5px 7px",borderRadius:7,background:"rgba(255,255,255,.08)",border:"1px solid rgba(255,255,255,.1)",color:"#f0f0f0",fontSize:12,fontWeight:600,textAlign:"right"},
  dinp: {width:44,padding:"5px 5px",borderRadius:7,background:"rgba(233,196,106,.1)",border:"1px solid rgba(233,196,106,.3)",color:"#e9c46a",fontSize:12,fontWeight:700,textAlign:"center"},
  frow: {display:"flex",gap:8,flexWrap:"wrap",marginBottom:8},
  kgrid: {display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:10,marginBottom:12},
  r2: {display:"grid",gridTemplateColumns:"1fr 1fr",gap:12},
  tbl: {width:"100%",borderCollapse:"collapse",fontSize:12},
  th: (c) => ({padding:"7px 9px",textAlign:"right",color:c||"#888",fontSize:10,fontWeight:700,borderBottom:"1px solid rgba(255,255,255,.08)"}),
  td: {padding:"7px 9px",textAlign:"right",borderBottom:"1px solid rgba(255,255,255,.05)"},
  tag: {display:"inline-block",background:"rgba(233,196,106,.25)",color:"#e9c46a",fontSize:9,fontWeight:800,padding:"2px 5px",borderRadius:4,marginLeft:6,verticalAlign:"middle"},
  utag: {display:"inline-block",background:"rgba(230,57,70,.25)",color:"#ff8a80",fontSize:9,fontWeight:800,padding:"2px 5px",borderRadius:4,marginLeft:6,verticalAlign:"middle"},
};

function KCard({label,value,color,icon}){
  return e("div",{style:{background:"rgba(255,255,255,.05)",borderRadius:13,padding:"13px 14px",borderTop:"3px solid "+color}},
    e("div",{style:{fontSize:18,marginBottom:5,color}},icon),
    e("div",{style:{fontSize:15,fontWeight:800}},value),
    e("div",{style:{fontSize:10,color:"#888",marginTop:3}},label)
  );
}

function MiniBar({data}){
  const max=Math.max(...data.map(r=>Math.max(r.inc,r.exp)),1);
  return e("div",{style:{display:"flex",gap:3,alignItems:"flex-end",height:60}},
    data.map((row,i)=>e("div",{key:i,style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",height:"100%"}},
      e("div",{style:{flex:1,display:"flex",alignItems:"flex-end",gap:1,width:"100%"}},
        e("div",{style:{flex:1,height:Math.round((row.inc/max)*50)+"px",background:"#2a9d8f",borderRadius:"2px 2px 0 0",minHeight:2}}),
        e("div",{style:{flex:1,height:Math.round((row.exp/max)*50)+"px",background:"#e63946",borderRadius:"2px 2px 0 0",minHeight:2}})
      ),
      e("div",{style:{fontSize:8,color:"#888",marginTop:2}},MONTHS[i])
    ))
  );
}

// ── DASHBOARD
function Dashboard({state,forecast,due,todayInc,togglePay,toggleInc}){
  const p=state.prices;
  const tm=forecast[CM]||{inc:0,exp:0,net:0,cum:0};
  const nw=nWorth(state);
  const pv=portVal(state.portfolio,p);
  const upcoming=(state.portfolio||[]).filter(pos=>pos.active&&pos.maturityDate&&dDiff(pos.maturityDate)>=0&&dDiff(pos.maturityDate)<=3).sort((a,b)=>dDiff(a.maturityDate)-dDiff(b.maturityDate));

  return e("div",{style:{display:"flex",flexDirection:"column",gap:14}},
    e("div",{style:{fontSize:17,fontWeight:800}},"Bu Ay · "+FULL_MONTHS[CM]+" "+CY),
    e("div",{style:S.kgrid},
      e(KCard,{label:"Aylık Gelir",value:fmt(tm.inc),color:"#2a9d8f",icon:"↑"}),
      e(KCard,{label:"Aylık Gider",value:fmt(tm.exp),color:"#e63946",icon:"↓"}),
      e(KCard,{label:"Net Tasarruf",value:fmt(tm.net),color:tm.net>=0?"#2a9d8f":"#e63946",icon:"="}),
      e(KCard,{label:"Toplam Varlık",value:fmt(nw),color:"#e9c46a",icon:"◈"}),
      e(KCard,{label:"Portföy",value:fmt(pv),color:"#f4a261",icon:"📊"})
    ),
    upcoming.length>0&&e("div",{style:{...S.card,borderColor:"rgba(230,57,70,.3)"}},
      e("div",{style:S.ctitle},"🔔 Yaklaşan Vadeler"),
      upcoming.map(pos=>{const d=dDiff(pos.maturityDate);return e("div",{key:pos.id,style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:"1px solid rgba(255,255,255,.06)"}},
        e("div",{style:{fontWeight:600}},pos.label,d===0&&e("span",{style:S.utag},"BUGÜN")),
        e("span",{style:{color:"#ff8a80",fontWeight:700}},d===0?"Bugün":d+" gün")
      )})
    ),
    todayInc.length>0&&e("div",{style:S.card},
      e("div",{style:S.ctitle},"💰 Bugün Gelmesi Beklenen Gelirler"),
      todayInc.map(item=>{
        const mk2=mkey(CY,CM);
        const col=!!(((state.monthlyData[mk2]||{}).incomeCollected)||{})[item.id];
        return e("div",{key:item.id,style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid rgba(255,255,255,.06)"}},
          e("div",null,e("div",{style:{fontWeight:600}},item.label),e("div",{style:{fontSize:11,color:"#e9c46a"}},fmt(item.amount))),
          e("button",{style:S.pbtn(col?"#2a9d8f":"#e9c46a",col?"#fff":"#0f0f13"),onClick:()=>toggleInc(mk2,item.id)},col?"✓ Geldi":"Geldi mi?")
        );
      })
    ),
    due.length>0&&e("div",{style:S.card},
      e("div",{style:S.ctitle},"🔔 Bugün Yapılacak Ödemeler"),
      due.map(item=>e("div",{key:item.id,style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid rgba(255,255,255,.06)"}},
        e("div",null,e("div",{style:{fontWeight:600}},item.label),!item.isCard&&e("div",{style:{fontSize:11,color:"#e9c46a"}},fmt(item.amount))),
        !item.isCut&&e("button",{style:S.pbtn("#e63946"),onClick:()=>togglePay(item.mk,item.id)},"✓ Ödedim")
      ))
    ),
    e("div",{style:S.card},e("div",{style:S.ctitle},"Yıl Boyu Birikim"),e(MiniBar,{data:forecast})),
    e("div",{style:S.r2},
      e("div",{style:S.card},
        e("div",{style:S.ctitle},"Gelir Kalemleri"),
        state.incomeItems.filter(i=>i.active).map(i=>e("div",{key:i.id,style:S.irow},
          e("span",{style:{color:"#ccc"}},i.label,i.incomeDay===CD&&e("span",{style:S.tag},"BUGÜN")),
          e("span",{style:{fontWeight:700,color:"#2a9d8f"}},fmt(i.amount))
        ))
      ),
      e("div",{style:S.card},
        e("div",{style:S.ctitle},"Gider Kalemleri"),
        state.expenseItems.filter(i=>i.active).map(i=>e("div",{key:i.id,style:S.irow},
          e("span",{style:{color:"#ccc"}},i.label,i.dueDay===CD&&e("span",{style:S.tag},"BUGÜN")),
          e("span",{style:{fontWeight:700,color:"#e63946"}},fmt(i.amount))
        ))
      )
    )
  );
}

// ── INCOME TAB
function IncomeTab({state,upd,toast}){
  const [form,setForm]=useState({label:"",type:"salary",amount:"",incomeDay:""});
  const total=state.incomeItems.filter(i=>i.active).reduce((s,i)=>s+i.amount,0);
  return e("div",{style:{display:"flex",flexDirection:"column",gap:14}},
    e("div",{style:{fontSize:17,fontWeight:800}},"Gelir Kalemleri"),
    e("div",{style:{padding:"10px 14px",borderRadius:11,background:"rgba(42,157,143,.15)",border:"1px solid rgba(42,157,143,.3)",color:"#2a9d8f",fontWeight:700}},"Toplam: "+fmt(total)),
    e("div",{style:S.card},
      state.incomeItems.map(it=>e("div",{key:it.id,style:{...S.lrow,opacity:it.active?1:0.45}},
        e("div",{style:{display:"flex",alignItems:"center",gap:8}},
          e("button",{style:{width:18,height:18,border:"none",background:"none",color:it.active?"#2a9d8f":"#555",cursor:"pointer",fontSize:14,padding:0},onClick:()=>upd(s=>{s.incomeItems=s.incomeItems.map(i=>i.id===it.id?{...i,active:!i.active}:i)})},it.active?"●":"○"),
          e("div",null,
            e("div",{style:{fontWeight:600,fontSize:13}},it.label,it.incomeDay===CD&&e("span",{style:S.tag},"BUGÜN")),
            e("div",{style:{fontSize:10,color:"#888"}},(INC_TYPES[it.type]||"")+(it.incomeDay?" · Ayın "+it.incomeDay+". günü":""))
          )
        ),
        e("div",{style:{display:"flex",alignItems:"center",gap:5}},
          e("input",{style:S.dinp,type:"number",min:1,max:31,placeholder:"Gün",value:it.incomeDay||"",onChange:ev=>upd(s=>{s.incomeItems=s.incomeItems.map(i=>i.id===it.id?{...i,incomeDay:+ev.target.value}:i)})}),
          e("input",{style:S.ainp,type:"number",value:it.amount,onChange:ev=>upd(s=>{s.incomeItems=s.incomeItems.map(i=>i.id===it.id?{...i,amount:+ev.target.value}:i)})}),
          e("span",{style:{fontSize:11,color:"#888"}},"₺"),
          e("button",{style:S.delbtn,onClick:()=>upd(s=>{s.incomeItems=s.incomeItems.filter(i=>i.id!==it.id)})},"✕")
        )
      ))
    ),
    e("div",{style:S.card},
      e("div",{style:S.ctitle},"Yeni Gelir"),
      e("div",{style:S.frow},
        e("input",{style:S.inp,placeholder:"Kalem adı",value:form.label,onChange:ev=>setForm(f=>({...f,label:ev.target.value}))}),
        e("select",{style:S.sel,value:form.type,onChange:ev=>setForm(f=>({...f,type:ev.target.value}))},
          Object.entries(INC_TYPES).map(([k,v])=>e("option",{key:k,value:k},v))
        )
      ),
      e("div",{style:S.frow},
        e("input",{style:S.inp,type:"number",placeholder:"Tutar ₺",value:form.amount,onChange:ev=>setForm(f=>({...f,amount:ev.target.value}))}),
        e("input",{style:S.inp,type:"number",placeholder:"Ayın kaçında? (ör: 5)",min:1,max:31,value:form.incomeDay,onChange:ev=>setForm(f=>({...f,incomeDay:ev.target.value}))}),
        e("button",{style:S.addbtn,onClick:()=>{
          if(!form.label||!form.amount)return;
          upd(s=>{s.incomeItems=[...s.incomeItems,{id:uid(),...form,amount:+form.amount,incomeDay:+form.incomeDay||0,active:true}]});
          setForm({label:"",type:"salary",amount:"",incomeDay:""});
          toast("Gelir kalemi eklendi");
        }},"+ Ekle")
      )
    ),
    e("div",{style:S.card},
      e("div",{style:S.ctitle},"📅 Bu Ay Gelir Takvimi"),
      state.incomeItems.filter(i=>i.active&&i.incomeDay>0).length===0&&e("div",{style:{color:"#666",fontSize:12,padding:"8px 0"}},"Gelir günü girilmemiş."),
      state.incomeItems.filter(i=>i.active&&i.incomeDay>0).sort((a,b)=>a.incomeDay-b.incomeDay).map(it=>{
        const isT=it.incomeDay===CD, isP=it.incomeDay<CD;
        return e("div",{key:it.id,style:S.prow(isT?"rgba(233,196,106,.1)":"rgba(255,255,255,.02)")},
          e("div",null,e("div",{style:{fontWeight:600}},it.label,isT&&e("span",{style:S.tag},"BUGÜN")),e("div",{style:{fontSize:10,color:"#888"}},"Ayın "+it.incomeDay+". günü")),
          e("div",{style:{textAlign:"right"}},e("div",{style:{fontWeight:700,color:"#2a9d8f"}},fmt(it.amount)),e("div",{style:{fontSize:10,color:"#888"}},isT?"Bugün":isP?(CD-it.incomeDay)+"g önce":(it.incomeDay-CD)+"g sonra"))
        );
      })
    )
  );
}

// ── EXPENSES TAB
function ExpensesTab({state,upd,toast}){
  const [form,setForm]=useState({label:"",type:"fixed",amount:"",dueDay:"",remaining:""});

    e("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:10,marginBottom:4}},
      e(KCard,{label:"Toplam Varlık",value:fmt(cashVal+portVal2),color:"#e9c46a",icon:"◈"}),
      e(KCard,{label:"Nakit & Banka",value:fmt(cashVal),color:"#2a9d8f",icon:"₺"}),
      e(KCard,{label:"Portföy",value:fmt(portVal2),color:"#f4a261",icon:"📊"})
    ),
    e("div",{style:{...S.card,borderColor:"rgba(233,196,106,.2)"}},
      e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}},

        e("button",{style:{...S.addbtn,padding:"5px 10px",fontSize:11,opacity:loading?.6:1},onClick:refresh,disabled:loading},loading?"⏳ Çekiliyor...":"↻ Güncelle")
      ),
      offline&&e("div",{style:{color:"#e9c46a",fontSize:11,marginBottom:6}},"📴 Çevrimdışı — son kayıtlı fiyatlar"),
      info&&!offline&&e("div",{style:{color:"#555",fontSize:10,marginBottom:9}},"Son güncelleme: "+info+" · gold-api.com & frankfurter.app"),
      e("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(120px,1fr))",gap:7}},
        priceGrid.map(it=>e("div",{key:it.label,style:{background:"rgba(255,255,255,.04)",borderRadius:8,padding:"7px 10px",border:"1px solid "+it.color+"22"}},
          e("div",{style:{fontSize:9,color:"#888",marginBottom:2}},it.label),
          e("div",{style:{fontSize:13,fontWeight:800,color:it.color}},it.value>0?it.value.toLocaleString("tr-TR"):"—"),
          e("div",{style:{fontSize:9,color:"#555",marginTop:1}},it.unit)
        ))
      ),
      e("div",{style:{...S.frow,marginTop:10}},
        [["gold_gram","Gram Altın (₺)"],["usd","USD/TL"],["eur","EUR/TL"]].map(([k,l])=>
          e("div",{key:k,style:{flex:1}},
            e("label",{style:{fontSize:10,color:"#888",display:"block",marginBottom:3}},l+" (manuel)"),
            e("input",{style:S.inp,type:"number",value:p[k],onChange:ev=>upd(s=>{s.prices={...s.prices,[k]:+ev.target.value}})})
          )
        )
      )
    ),
    e("div",{style:S.card},
      e("div",{style:S.ctitle},"💵 Nakit ve Banka"),
      [["cash_try","Nakit TL","₺",1],["cash_usd","Dolar","$",p.usd],["cash_eur","Euro","€",p.eur],["other","Diğer","₺",1]].map(([k,l,u,rate])=>
        e("div",{key:k,style:S.lrow},
          e("div",null,e("div",{style:{color:"#ccc",fontSize:13}},l),a[k]>0&&u!=="₺"&&e("div",{style:{fontSize:9,color:"#2a9d8f"}},fmt(a[k]*rate))),
          e("div",{style:{display:"flex",alignItems:"center",gap:5}},
            e("input",{style:S.ainp,type:"number",value:a[k],onChange:ev=>upd(s=>{s.assets={...s.assets,[k]:+ev.target.value}})}),
            e("span",{style:{fontSize:11,color:"#888"}},u)
          )
        )
      )
    )
  );
}

    e("div",{style:S.card},
      e("div",{style:S.ctitle},"Aylık Tablo"),
      e("div",{style:{overflowX:"auto"}},
        e("table",{style:S.tbl},
          e("thead",null,e("tr",null,e("th",{style:{...S.th(),textAlign:"left"}},"Ay"),e("th",{style:S.th("#2a9d8f")},"Gelir"),e("th",{style:S.th("#e63946")},"Gider"),e("th",{style:S.th()},"Net"),e("th",{style:S.th()},"Birikimli"))),
          e("tbody",null,forecast.map((row,i)=>e("tr",{key:i,style:{background:i===CM?"rgba(233,196,106,.1)":"transparent"}},

            e("td",{style:{...S.td,color:row.net>=0?"#2a9d8f":"#e63946",fontWeight:600}},fmt(row.net)),
            e("td",{style:{...S.td,color:row.cum>=0?"#e9c46a":"#e63946",fontWeight:700}},fmt(row.cum))
          )))

      )
    ),
    e("div",{style:S.card},
      e("div",{style:S.ctitle},"Bar Grafik"),
      e("div",{style:{display:"flex",gap:5,alignItems:"flex-end",height:115,marginTop:8}},
        forecast.map((row,i)=>e("div",{key:i,style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}},

          ),

        ))
      ),
      e("div",{style:{marginTop:8,fontSize:11,color:"#888"}},
        e("span",{style:{color:"#2a9d8f"}},"■ Gelir"),e("span",{style:{color:"#e63946",marginLeft:12}},"■ Gider")
      )
    )
  );
}

  return e("div",{style:{display:"flex",flexDirection:"column",gap:14}},
    e("div",{style:{fontSize:17,fontWeight:800}},"Özel Bütçe Dönemleri"),
    state.budgets.length===0&&e("div",{style:{color:"#666",fontSize:12,padding:"8px 0"}},"Tatil, düğün gibi özel harcamalar ekleyin."),
    e("div",{style:{display:"grid",gap:9,gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))"}},
      state.budgets.map(b=>e("div",{key:b.id,style:{...S.card,border:"1px solid rgba(233,196,106,.2)"}},
        e("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:6}},
          e("div",null,e("div",{style:{fontWeight:700,fontSize:14}},b.label),e("div",{style:{fontSize:10,color:"#888"}},FULL_MONTHS[b.month]+" "+b.year)),
          e("button",{style:S.delbtn,onClick:()=>upd(s=>{s.budgets=s.budgets.filter(x=>x.id!==b.id)})},"✕")
        ),
        e("div",{style:{fontSize:19,fontWeight:900,color:"#e9c46a"}},fmt(b.amount)),
        b.note&&e("div",{style:{fontSize:10,color:"#888",marginTop:5}},b.note)
      ))
    ),
    e("div",{style:S.card},
      e("div",{style:S.ctitle},"Yeni Bütçe"),
      e("div",{style:S.frow},
        e("input",{style:S.inp,placeholder:"Bütçe adı (ör: Tatil)",value:form.label,onChange:ev=>setForm(f=>({...f,label:ev.target.value}))}),
        e("input",{style:S.inp,type:"number",placeholder:"Tutar ₺",value:form.amount,onChange:ev=>setForm(f=>({...f,amount:ev.target.value}))})
      ),
      e("div",{style:S.frow},
        e("select",{style:S.sel,value:form.month,onChange:ev=>setForm(f=>({...f,month:+ev.target.value}))},
          FULL_MONTHS.map((m,i)=>e("option",{key:i,value:i},m))
        ),
        e("input",{style:S.inp,type:"number",placeholder:"Yıl",value:form.year,onChange:ev=>setForm(f=>({...f,year:+ev.target.value}))}),
        e("input",{style:S.inp,placeholder:"Not",value:form.note,onChange:ev=>setForm(f=>({...f,note:ev.target.value}))}),
        e("button",{style:S.addbtn,onClick:()=>{
          if(!form.label||!form.amount)return;
          upd(s=>{s.budgets=[...s.budgets,{id:uid(),...form,amount:+form.amount}]});
          setForm({label:"",amount:"",month:CM,year:CY,note:""});
          toast("Bütçe eklendi");
        }},"+ Ekle")
      )
    )
  );
}

// ── MAIN APP
function App(){
  const [state,setState]=useState(()=>{ const s=LS.get("butce_v6",null); return s?{...mkDefault(),...s}:mkDefault() });
  const [toastMsg,setToastMsg]=useState(null);
  const [driveToken,setDriveToken]=useState(null);
  const [dStatus,setDStatus]=useState("idle");
  const [lastSync,setLastSync]=useState(LS.get("last_sync",""));
  const tokenRef=useRef(null);

  useEffect(()=>{ LS.set("butce_v6",state) },[state]);
  useEffect(()=>{ if(toastMsg){ const t=setTimeout(()=>setToastMsg(null),2800); return ()=>clearTimeout(t) } },[toastMsg]);

  const toast=msg=>setToastMsg(msg);
  const upd=useCallback(fn=>setState(s=>{ const n={...s}; fn(n); return n }),[]);

  useEffect(()=>{
    const iv=setInterval(()=>{
      if(window.google&&window.google.accounts&&window.google.accounts.oauth2){
        clearInterval(iv);
        tokenRef.current=window.google.accounts.oauth2.initTokenClient({
          client_id:CLIENT_ID,scope:SCOPES,
          callback:resp=>{ if(resp.error){toast("Drive hatası");return} setDriveToken(resp.access_token); toast("Drive bağlandı ✓") }
        });
      }
    },300);
    return ()=>clearInterval(iv);
  },[]);

  useEffect(()=>{ checkNotifs(state) },[]);

  function connectDrive(){ if(tokenRef.current)tokenRef.current.requestAccessToken() }

  async function saveDrive(){
    if(!driveToken){connectDrive();return}
    setDStatus("saving");
    try{ await dSave(driveToken,state); const t=new Date().toLocaleTimeString("tr-TR"); setLastSync(t); LS.set("last_sync",t); setDStatus("ok"); toast("Drive'a kaydedildi ✓") }
    catch(_){ setDStatus("err"); toast("Kaydetme hatası") }
  }

  async function loadDrive(){
    if(!driveToken){connectDrive();return}
    setDStatus("loading");
    try{ const data=await driveLoad(driveToken); if(data){setState({...mkDefault(),...data});toast("Drive'dan yüklendi ✓")}else toast("Drive'da kayıt yok"); setDStatus("ok") }
    catch(_){ setDStatus("err"); toast("Yükleme hatası") }
  }

  async function reqNotif(){ if("Notification" in window){ const r=await Notification.requestPermission(); if(r==="granted"){toast("Bildirimler aktif 🔔");checkNotifs(state)} } }

  function togglePay(mk,id){
    upd(s=>{ const md={...(s.monthlyData[mk]||{})}; const pays={...(md.payments||{})}; pays[id]=!pays[id]; md.payments=pays; s.monthlyData={...s.monthlyData,[mk]:md} });
    toast("Ödeme güncellendi ✓");
  }
  function toggleInc(mk,id){
    upd(s=>{ const md={...(s.monthlyData[mk]||{})}; const ic={...(md.incomeCollected||{})}; ic[id]=!ic[id]; md.incomeCollected=ic; s.monthlyData={...s.monthlyData,[mk]:md} });
    toast("Gelir güncellendi ✓");
  }

  function todayDue(){
    const k=mkey(CY,CM), pays=((state.monthlyData[k]||{}).payments)||{};
    const due=[];
    state.expenseItems.filter(i=>i.active&&i.dueDay===CD&&!pays[i.id]).forEach(i=>due.push({...i,mk:k}));
    state.creditCards.forEach(c=>{ if(c.dueDay===CD)due.push({id:c.id,label:c.label+" Son Ödeme",mk:k,isCard:true}); if(c.cutDay===CD)due.push({id:"cut_"+c.id,label:c.label+" Hesap Kesim",mk:k,isCard:true,isCut:true}) });
    return due;
  }
  function todayInc(){
    const k=mkey(CY,CM), ic=((state.monthlyData[k]||{}).incomeCollected)||{};
    return state.incomeItems.filter(i=>i.active&&i.incomeDay===CD&&!ic[i.id]);
  }

  let cum=0;
  const forecast=Array.from({length:12},(_,m)=>{ const inc=mIncome(state,CY,m),exp=mExpense(state,CY,m); cum+=inc-exp; return{m,inc,exp,net:inc-exp,cum} });

  const due=todayDue(), tInc=todayInc();
  const tab=state.activeTab;
  const setTab=t=>upd(s=>{s.activeTab=t});

  const TABS=[{id:"dashboard",icon:"◉",label:"Özet"},{id:"income",icon:"↑",label:"Gelirler"},{id:"expenses",icon:"↓",label:"Giderler"},{id:"payments",icon:"✓",label:"Ödemeler"},{id:"cards",icon:"▣",label:"Kartlar"},{id:"portfolio",icon:"📊",label:"Portföy"},{id:"assets",icon:"◈",label:"Varlıklar"},{id:"forecast",icon:"⤴",label:"Projeksiyon"},{id:"budgets",icon:"◎",label:"Bütçeler"}];

  function hbtn(bg,color,border,label,onClick){
    return e("button",{style:{padding:"5px 10px",borderRadius:8,fontSize:11,cursor:"pointer",border:"1px solid "+border,background:bg,color,fontWeight:700},onClick},label);
  }

  return e("div",{style:{minHeight:"100vh",background:"#0f0f13",color:"#e8e8e8"}},
    // Header
    e("header",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 16px",background:"rgba(255,255,255,.04)",borderBottom:"1px solid rgba(255,255,255,.08)",position:"sticky",top:0,zIndex:100,flexWrap:"wrap",gap:7}},
      e("div",{style:{display:"flex",alignItems:"center",gap:11}},
        e("div",{style:{width:36,height:36,borderRadius:10,background:"linear-gradient(135deg,#e9c46a,#f4a261)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,fontWeight:900,color:"#0f0f13"}},"₺"),
        e("div",null,e("div",{style:{fontWeight:800,fontSize:14,letterSpacing:"-0.3px"}},"Bütçe Defterim"),e("div",{style:{fontSize:10,color:"#888"}},CY+" · Kişisel Finans"))
      ),
      e("div",{style:{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}},
        tInc.length>0&&e("div",{style:{background:"rgba(42,157,143,.2)",border:"1px solid rgba(42,157,143,.4)",color:"#2a9d8f",padding:"4px 9px",borderRadius:20,fontSize:11,cursor:"pointer",fontWeight:600},onClick:()=>setTab("payments")},"💰 "+tInc.length+" gelir bugün"),
        due.length>0&&e("div",{style:{background:"rgba(230,57,70,.25)",border:"1px solid rgba(230,57,70,.5)",color:"#ff8a80",padding:"4px 9px",borderRadius:20,fontSize:11,cursor:"pointer",fontWeight:600},onClick:()=>setTab("payments")},"🔔 "+due.length+" ödeme bugün"),
        Notification.permission!=="granted"&&hbtn("rgba(233,196,106,.15)","#e9c46a","rgba(233,196,106,.4)","🔔 Bildirimleri Aç",reqNotif),
        !driveToken
          ?hbtn("rgba(66,133,244,.2)","#4285f4","rgba(66,133,244,.4)","☁ Drive",connectDrive)
          :e("div",{style:{display:"flex",gap:5}},
            hbtn("rgba(42,157,143,.2)","#2a9d8f","rgba(42,157,143,.4)",dStatus==="saving"?"⏳":"↑ Kaydet",saveDrive),
            hbtn("rgba(233,196,106,.15)","#e9c46a","rgba(233,196,106,.3)",dStatus==="loading"?"⏳":"↓ Yükle",loadDrive)
          )
      )
    ),
    // Sync bar
    driveToken&&e("div",{style:{fontSize:11,padding:"5px 14px",background:"rgba(42,157,143,.07)",borderBottom:"1px solid rgba(42,157,143,.13)",display:"flex",alignItems:"center",gap:7,color:"#2a9d8f"}},
      "☁ Drive bağlı"+(lastSync?" · Son kayıt: "+lastSync:" · Henüz kaydedilmedi"),
      e("span",{style:{marginLeft:"auto",color:"#444"}},"Sadece sizin Drive'ınızda")
    ),
    // Nav
    e("nav",{style:{display:"flex",overflowX:"auto",gap:2,padding:"5px 11px",background:"rgba(255,255,255,.02)",borderBottom:"1px solid rgba(255,255,255,.06)"}},
      TABS.map(t=>e("button",{key:t.id,style:{display:"flex",alignItems:"center",gap:4,padding:"6px 10px",borderRadius:7,border:"none",background:tab===t.id?"rgba(233,196,106,.15)":"transparent",color:tab===t.id?"#e9c46a":"#888",cursor:"pointer",fontSize:11,fontWeight:tab===t.id?700:500,whiteSpace:"nowrap"},onClick:()=>setTab(t.id)},t.icon," ",t.label))
    ),
    // Main
    e("main",{style:{padding:"16px 14px",maxWidth:960,margin:"0 auto"}},
      tab==="dashboard"&&e(Dashboard,{state,forecast,due,todayInc:tInc,togglePay,toggleInc}),
      tab==="income"   &&e(IncomeTab,{state,upd,toast}),
      tab==="expenses" &&e(ExpensesTab,{state,upd,toast}),
      tab==="payments" &&e(PaymentsTab,{state,togglePay,toggleInc}),
      tab==="cards"    &&e(CardsTab,{state,upd,toast}),
      tab==="portfolio"&&e(PortfolioTab,{state,upd,toast}),
      tab==="assets"   &&e(AssetsTab,{state,upd}),
      tab==="forecast" &&e(ForecastTab,{forecast}),
      tab==="budgets"  &&e(BudgetsTab,{state,upd,toast})
    ),
    // Toast
    toastMsg&&e("div",{style:{position:"fixed",bottom:18,right:18,zIndex:9999,padding:"9px 15px",borderRadius:10,fontWeight:700,color:"#fff",fontSize:13,background:"#2a9d8f",boxShadow:"0 6px 24px rgba(0,0,0,.4)",animation:"fi .2s ease"}},toastMsg)
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
