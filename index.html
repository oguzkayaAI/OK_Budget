function getMonthKey(y,m){return`${y}-${m}`}
function calcPortfolioValue(portfolio,prices){
  return portfolio.reduce((sum,pos)=>{
    if(!pos.active)return sum;
    if(pos.type.startsWith("gold_")){
      const w=GOLD_WEIGHTS[pos.type]||1;
      return sum+pos.quantity*w*prices.gold_gram;
    }
    if(pos.type==="deposit_try") return sum+pos.principal*(1+(pos.rate||0)/100*(pos.days||365)/365);
    if(pos.type==="deposit_usd") return sum+pos.principal*prices.usd*(1+(pos.rate||0)/100*(pos.days||365)/365);
    if(pos.type==="deposit_eur") return sum+pos.principal*prices.eur*(1+(pos.rate||0)/100*(pos.days||365)/365);
    if(pos.type==="fund"||pos.type==="stock"||pos.type==="crypto"||pos.type==="other"){
      return sum+(pos.currentValue||pos.principal||0);
    }
    return sum+( pos.currentValue||0);
  },0);
}
function calcNetWorth(state,prices){
  const a=state.assets;
  const cash=a.cash_try+a.cash_usd*prices.usd+a.cash_eur*prices.eur+a.other;
  const portfolio=calcPortfolioValue(state.portfolio,prices);
  return cash+portfolio;
}
function getMonthIncome(state,y,m){const ov=state.monthlyData[getMonthKey(y,m)]?.incomeOverrides||{};return state.incomeItems.filter(i=>i.active).reduce((s,i)=>s+(ov[i.id]!==undefined?ov[i.id]:i.amount),0)}
function getMonthExpense(state,y,m){const ov=state.monthlyData[getMonthKey(y,m)]?.expenseOverrides||{};const bt=state.budgets.filter(b=>b.year===y&&b.month===m).reduce((s,b)=>s+b.amount,0);return state.expenseItems.filter(i=>i.active).reduce((s,i)=>s+(ov[i.id]!==undefined?ov[i.id]:i.amount),0)+bt}
// ─── MASKING & PIN
let _masked = true;
const maskListeners = [];
function setMasked(v){_masked=v;maskListeners.forEach(fn=>fn(v));}
function useMasked(){
  const [masked,setM]=useState(_masked);
  useEffect(()=>{
    const fn=v=>setM(v);
    maskListeners.push(fn);
    return()=>{const i=maskListeners.indexOf(fn);if(i>-1)maskListeners.splice(i,1);};
  },[]);
  return masked;
}
function tryUnmask(){
  const savedPin=S.get("mask_pin",null);
  if(!savedPin){
    const pin=prompt("İlk kullanım: Dilediğiniz PIN'i girin (4+ karakter):");
    if(!pin||pin.length<4){alert("En az 4 karakter olmalı.");return;}
    S.set("mask_pin",pin);
    setMasked(false);
  } else {
    const pin=prompt("PIN girin:");
    if(!pin)return;
    if(pin===savedPin){setMasked(false);}
    else{alert("Yanlış PIN");}
  }
}

function fmt(n,dec=0){if(!n&&n!==0)return"—";return new Intl.NumberFormat("tr-TR",{style:"currency",currency:"TRY",maximumFractionDigits:dec}).format(n)}
function fmtM(n,masked,dec=0){if(masked)return"••••••";return fmt(n,dec)}
function fmtNum(n,dec=2){if(!n&&n!==0)return"—";return n.toLocaleString("tr-TR",{maximumFractionDigits:dec})}
function daysLeft(day){return((day-CD+31)%31)||31}
function daysDiff(dateStr){const d=new Date(dateStr);const diff=Math.round((d-now)/(1000*60*60*24));return diff}

async function findFile(token){const r=await fetch(`https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name='${FILE_NAME}'&fields=files(id,name)`,{headers:{Authorization:`Bearer ${token}`}});const d=await r.json();return d.files?.[0]||null}
async function saveToD(token,data){
  const content=JSON.stringify(data);
  const ex=await findFile(token);
  if(ex){await fetch(`https://www.googleapis.com/upload/drive/v3/files/${ex.id}?uploadType=media`,{method:"PATCH",headers:{Authorization:`Bearer ${token}`,"Content-Type":"application/json"},body:content})}
  else{const m=await fetch("https://www.googleapis.com/drive/v3/files?fields=id",{method:"POST",headers:{Authorization:`Bearer ${token}`,"Content-Type":"application/json"},body:JSON.stringify({name:FILE_NAME,parents:["appDataFolder"]})});const{id}=await m.json();await fetch(`https://www.googleapis.com/upload/drive/v3/files/${id}?uploadType=media`,{method:"PATCH",headers:{Authorization:`Bearer ${token}`,"Content-Type":"application/json"},body:content})}
}
async function loadFromD(token){const f=await findFile(token);if(!f)return null;const r=await fetch(`https://www.googleapis.com/drive/v3/files/${f.id}?alt=media`,{headers:{Authorization:`Bearer ${token}`}});return r.json()}

// ─── LIVE PRICES
async function fetchLivePrices(){
  // 1. Döviz: frankfurter.app (ücretsiz, CORS açık)
  let usdTry, eurTry;
  try{
    const ctrl=new AbortController();
    const timer=setTimeout(()=>ctrl.abort(),8000);
    const fx=await fetch("https://api.frankfurter.app/latest?from=USD&to=TRY,EUR",{signal:ctrl.signal});
    clearTimeout(timer);
    const fxd=await fx.json();
    usdTry=fxd.rates.TRY;
    eurTry=(1/fxd.rates.EUR)*usdTry;
  }catch(e){
    // Fallback: exchangerate-api (no key, CORS açık)
    const ctrl2=new AbortController();
    const timer2=setTimeout(()=>ctrl2.abort(),8000);
    const fx2=await fetch("https://open.er-api.com/v6/latest/USD",{signal:ctrl2.signal});
    clearTimeout(timer2);
    const fxd2=await fx2.json();
    usdTry=fxd2.rates.TRY;
    eurTry=fxd2.rates.EUR*usdTry/fxd2.rates.EUR; // EUR/TRY
    // düzgün hesap:
    const eurUsd=1/fxd2.rates.EUR; // EUR/USD
    eurTry=eurUsd*usdTry;
  }

  // 2. Altın: gold-api.com (ücretsiz, CORS açık, no key)
  let gramTry;
  try{
    const ctrl=new AbortController();
    const timer=setTimeout(()=>ctrl.abort(),8000);
    const gold=await fetch("https://gold-api.com/price/XAU",{signal:ctrl.signal});
    clearTimeout(timer);
    const goldd=await gold.json();
    gramTry=(goldd.price*usdTry)/31.1035;
  }catch(e){
    // Fallback: fiyatı dövizden tahmin et (1 ons ≈ son bilinen değer)
    // Son önbellek değerini kullan, yoksa hesaplayamayız
    const cached=S.get("cached_prices",null);
    if(cached?.gold_gram) gramTry=cached.gold_gram;
    else throw new Error("Altın fiyatı alınamadı");
  }

  return{
    gold_gram:Math.round(gramTry),
    usd:Math.round(usdTry*100)/100,
    eur:Math.round(eurTry*100)/100
  };
}

// ─── NOTIFICATIONS
function sendNotif(title,body){if(Notification.permission==="granted")new Notification(title,{body})}
function checkAndNotify(state){
  const key=getMonthKey(CY,CM);
  const payments=state.monthlyData[key]?.payments||{};
  const ic=state.monthlyData[key]?.incomeCollected||{};
  state.expenseItems.filter(i=>i.active&&i.dueDay===CD&&!payments[i.id]).forEach(i=>sendNotif("💸 Ödeme Vadesi!",`${i.label} · ${fmt(i.amount)} bugün ödenmeli`));
  state.incomeItems.filter(i=>i.active&&i.incomeDay===CD&&!ic[i.id]).forEach(i=>sendNotif("💰 Gelir Günü!",`${i.label} · ${fmt(i.amount)} bugün hesabına geçmeli`));
  state.creditCards.forEach(c=>{
    if(c.cutDay===CD)sendNotif("✂️ Hesap Kesim!",`${c.label} kartının hesabı bugün kesiliyor`);
    if(c.dueDay===CD)sendNotif("💳 Son Ödeme!",`${c.label} kartının son ödeme günü bugün`);
    if(daysLeft(c.dueDay)===3)sendNotif("⚠️ Kart Uyarısı",`${c.label} kartına 3 gün kaldı`);
  });
  // Yatırım vade bildirimleri
  state.portfolio.filter(p=>p.active&&p.maturityDate).forEach(pos=>{
    const diff=daysDiff(pos.maturityDate);
    if(diff===0)sendNotif("🏦 Vade Bugün!",`${pos.label} vadesi bugün doluyor`);
    if(diff===3)sendNotif("⚠️ Vade Yaklaşıyor",`${pos.label} vadesine 3 gün kaldı`);
    if(diff===1)sendNotif("🔔 Yarın Vade!",`${pos.label} yarın vadesi doluyor`);
  });
}

// ─── PORTFOLIO POSITION CARD
function PosCard({pos,prices,onDelete,onUpdate}){
  const masked=useMasked();
  const [editing,setEditing]=useState(false);
  const [editVal,setEditVal]=useState(pos.currentValue||pos.principal||0);

  let currentValue=0;
  let label2="";
  if(pos.type.startsWith("gold_")){
    const w=GOLD_WEIGHTS[pos.type]||1;
    currentValue=pos.quantity*w*prices.gold_gram;
    label2=`${pos.quantity} adet × ${fmt(prices.gold_gram*w)} = `;
  } else if(pos.type==="deposit_try"){
    const interest=pos.principal*(pos.rate||0)/100*(pos.days||365)/365;
    currentValue=pos.principal+interest;
    label2=`Faiz: ${fmt(interest)}`;
  } else if(pos.type==="deposit_usd"){
    const interest=pos.principal*(pos.rate||0)/100*(pos.days||365)/365;
    currentValue=(pos.principal+interest)*prices.usd;
    label2=`${pos.principal+interest} USD × ${prices.usd}`;
  } else if(pos.type==="deposit_eur"){
    const interest=pos.principal*(pos.rate||0)/100*(pos.days||365)/365;
    currentValue=(pos.principal+interest)*prices.eur;
    label2=`${pos.principal+interest} EUR × ${prices.eur}`;
  } else {
    currentValue=pos.currentValue||pos.principal||0;
    label2=pos.principal?`Maliyet: ${fmt(pos.principal)}`:"";
  }

  const diff=pos.maturityDate?daysDiff(pos.maturityDate):null;
  let matStyle={};
  if(diff!==null){
    if(diff<=0)matStyle=s.maturityDue;
    else if(diff<=3)matStyle=s.maturityUrgent;
    else if(diff<=7)matStyle=s.maturityWarn;
    else matStyle=s.maturityOk;
  }

  const pnl=pos.principal&&!pos.type.startsWith("gold_")?currentValue-pos.principal:null;

  return (
    <div style={{...s.posCard,...matStyle}}>
      <div style={s.posTop}>
        <div>
          <div style={s.posLbl}>
            {pos.label}
            {diff===0&&<span style={s.urgTag}>VADE BUGÜN</span>}
            {diff===1&&<span style={s.urgTag}>YARIN VADE</span>}
            {diff!==null&&diff>1&&diff<=3&&<span style={s.urgTag}>{diff} GÜN</span>}
          </div>
          <div style={s.posType}>{INV_TYPES[pos.type]||pos.type}</div>
        </div>
        <div style={s.posVal}>
          <div style={s.posAmt}>{masked?"••••••":fmt(currentValue)}</div>
          {label2&&<div style={s.posSub}>{masked?"••••":label2}</div>}
          {pnl!==null&&<div style={{fontSize:10,color:pnl>=0?"#2a9d8f":"#e63946",marginTop:2}}>{pnl>=0?"▲":"▼"} {masked?"••••":fmt(Math.abs(pnl))}</div>}
        </div>
      </div>

      <div style={s.posBody}>
        {pos.type.startsWith("gold_")&&<div style={s.posFld}><div style={s.posFldLbl}>Miktar</div><div style={s.posFldVal}>{pos.quantity} adet</div></div>}
        {pos.principal&&!pos.type.startsWith("gold_")&&<div style={s.posFld}><div style={s.posFldLbl}>Anapara</div><div style={s.posFldVal}>{pos.type.includes("usd")?"$"+pos.principal:pos.type.includes("eur")?"€"+pos.principal:fmt(pos.principal)}</div></div>}
        {pos.rate&&<div style={s.posFld}><div style={s.posFldLbl}>Faiz</div><div style={s.posFldVal}>%{pos.rate}</div></div>}
        {pos.days&&<div style={s.posFld}><div style={s.posFldLbl}>Vade Süresi</div><div style={s.posFldVal}>{pos.days} gün</div></div>}
        {pos.maturityDate&&<div style={s.posFld}><div style={s.posFldLbl}>Vade Tarihi</div><div style={{...s.posFldVal,color:diff!==null&&diff<=3?"#ff8a80":"#e8e8e8"}}>{pos.maturityDate}{diff!==null&&<span style={{fontSize:9,marginLeft:4,color:"#888"}}>{diff===0?"bugün":diff<0?`${Math.abs(diff)}g geçti`:`${diff}g kaldı`}</span>}</div></div>}
        {pos.startDate&&<div style={s.posFld}><div style={s.posFldLbl}>Başlangıç</div><div style={s.posFldVal}>{pos.startDate}</div></div>}
      </div>

      {/* Güncelle / Sil */}
      <div style={{marginTop:10,display:"flex",gap:8,alignItems:"center"}}>
        {(pos.type==="fund"||pos.type==="stock"||pos.type==="crypto"||pos.type==="other")&&(
          editing
            ?<><input style={{...s.ainp,width:110}} type="number" value={editVal} onChange={e=>setEditVal(+e.target.value)}/><button style={{...s.addbtn,padding:"5px 10px",fontSize:11}} onClick={()=>{onUpdate(pos.id,{currentValue:editVal});setEditing(false)}}>Kaydet</button><button style={{...s.delbtn,background:"transparent",color:"#888"}} onClick={()=>setEditing(false)}>İptal</button></>
            :<button style={{...s.pbtn,background:"rgba(233,196,106,.2)",color:"#e9c46a",fontSize:10}} onClick={()=>setEditing(true)}>✏ Güncelle</button>
        )}
        <button style={{...s.delbtn,marginLeft:"auto"}} onClick={()=>onDelete(pos.id)}>✕</button>
      </div>
    </div>
  );
}

        <select style={s.sel} value={form.type} onChange={e=>setForm(f=>({...f,type:e.target.value}))}>
          {Object.entries(INV_TYPES).map(([k,v])=><option key={k} value={k}>{v}</option>)}
        </select>
      </div>

        {isGold&&<input style={s.inp} type="number" placeholder="Adet" value={form.quantity} onChange={e=>setForm(f=>({...f,quantity:e.target.value}))}/>}
        {(isDeposit||isFlex)&&<input style={s.inp} type="number" placeholder={isDeposit?"Anapara":"Maliyet (opsiyonel)"} value={form.principal} onChange={e=>setForm(f=>({...f,principal:e.target.value}))}/>}
        {isDeposit&&<><input style={s.inp} type="number" placeholder="Yıllık faiz %" value={form.rate} onChange={e=>setForm(f=>({...f,rate:e.target.value}))} step="0.01"/><input style={s.inp} type="number" placeholder="Vade gün sayısı" value={form.days} onChange={e=>setForm(f=>({...f,days:e.target.value}))}/></>}
        {isFlex&&<input style={s.inp} type="number" placeholder="Güncel değer ₺" value={form.currentValue} onChange={e=>setForm(f=>({...f,currentValue:e.target.value}))}/>}
      </div>
      {(isDeposit||isGold)&&(
        <div style={s.frow}>

          {isDeposit&&<div style={s.pf}><label style={s.pl}>Vade Tarihi</label><div style={{display:"flex",gap:5}}><input style={s.inp} type="date" value={form.maturityDate} onChange={e=>setForm(f=>({...f,maturityDate:e.target.value}))}/><button style={{...s.addbtn,padding:"7px 8px",fontSize:10,whiteSpace:"nowrap"}} onClick={calcMaturity}>Hesapla</button></div></div>}
        </div>
      )}
      <button style={s.addbtn} onClick={()=>{
        if(!form.label)return;
        const pos={id:uid(),active:true,...form,
          principal:+form.principal||0,
          quantity:+form.quantity||0,
          rate:+form.rate||0,
          days:+form.days||365,
          currentValue:+form.currentValue||0,
        };
        onAdd(pos);
        setForm({label:"",type:"deposit_try",principal:"",quantity:"",rate:"",days:"365",startDate:TODAY_STR,maturityDate:"",currentValue:""});
        showToast("Pozisyon eklendi ✓");
      }}>+ Ekle</button>
    </div>
  );
}

// ─── PORTFOLIO TAB
function PortfolioTab({state,upd,showToast}){
  const prices=state.prices;
  const portfolio=state.portfolio||[];
  const totalValue=calcPortfolioValue(portfolio,prices);

  const byType={};
  portfolio.filter(p=>p.active).forEach(p=>{
    const t=INV_TYPES[p.type]?.split(" ")[0]||p.type;
    if(!byType[t])byType[t]=0;
    if(p.type.startsWith("gold_")){const w=GOLD_WEIGHTS[p.type]||1;byType[t]+=p.quantity*w*prices.gold_gram;}
    else if(p.type==="deposit_try"){const i=p.principal*(p.rate||0)/100*(p.days||365)/365;byType[t]+=p.principal+i;}
    else if(p.type==="deposit_usd"){const i=p.principal*(p.rate||0)/100*(p.days||365)/365;byType[t]+=(p.principal+i)*prices.usd;}
    else if(p.type==="deposit_eur"){const i=p.principal*(p.rate||0)/100*(p.days||365)/365;byType[t]+=(p.principal+i)*prices.eur;}
    else byType[t]+=(p.currentValue||p.principal||0);
  });

  const upcomingMaturities=portfolio.filter(p=>p.active&&p.maturityDate&&daysDiff(p.maturityDate)<=7&&daysDiff(p.maturityDate)>=0).sort((a,b)=>daysDiff(a.maturityDate)-daysDiff(b.maturityDate));

  return (
    <div style={s.tc}>
      <div style={s.stitle}>Yatırım Portföyü</div>
      <div style={s.kgrid}>
        <KpiCard label="Toplam Portföy" value={fmt(totalValue)} color="#e9c46a" icon="📊"/>
        {Object.entries(byType).map(([t,v])=><KpiCard key={t} label={t} value={fmt(v)} color="#f4a261" icon="◉"/>)}
      </div>

      {upcomingMaturities.length>0&&(
        <div style={{...s.card,borderColor:"rgba(230,57,70,.3)"}}>
          <div style={s.ctitle}>🔔 Yaklaşan Vadeler (7 gün içinde)</div>
          {upcomingMaturities.map(pos=>{
            const diff=daysDiff(pos.maturityDate);
            return <div key={pos.id} style={{...s.drow}}>
              <div><div style={s.dlbl}>{pos.label}{diff===0&&<span style={s.urgTag}>BUGÜN</span>}</div><div style={s.posSub}>{INV_TYPES[pos.type]} · Vade: {pos.maturityDate}</div></div>
              <div style={{textAlign:"right",color:"#ff8a80",fontWeight:700}}>{diff===0?"Bugün":`${diff} gün`}</div>
            </div>;
          })}
        </div>
      )}

      <div>
        {portfolio.length===0&&<div style={s.empty}>Henüz pozisyon yok. Aşağıdan ekleyin.</div>}
        {portfolio.map(pos=>(
          <PosCard
            key={pos.id}
            pos={pos}
            prices={prices}
            onDelete={id=>upd(st=>{st.portfolio=st.portfolio.filter(p=>p.id!==id);})}
            onUpdate={(id,changes)=>upd(st=>{st.portfolio=st.portfolio.map(p=>p.id===id?{...p,...changes}:p);})}
          />
        ))}
      </div>
      <AddPositionForm onAdd={pos=>upd(st=>{st.portfolio=[...st.portfolio,pos];})} showToast={showToast}/>
    </div>
  );
}

// ─── ASSETS TAB (nakit + canlı fiyat)
function AssetsTab({state,upd}){
  const masked=useMasked();
  const a=state.assets; const p=state.prices;
  const [loading,setLoading]=useState(false);
  const [lastFetch,setLastFetch]=useState(S.get("last_price_fetch",null));
  const [fetchError,setFetchError]=useState(null);
  const [offline,setOffline]=useState(false);

  const cashVal=a.cash_try+a.cash_usd*p.usd+a.cash_eur*p.eur+a.other;
  const portfolioVal=calcPortfolioValue(state.portfolio||[],p);
  const nw=cashVal+portfolioVal;

  const fetchPrices=async()=>{
    setLoading(true);setFetchError(null);setOffline(false);
    try{
      const res=await fetchLivePrices();
      upd(st=>{st.prices={...st.prices,...res};});
      S.set("cached_prices",res);
      const t=new Date().toLocaleTimeString("tr-TR");
      setLastFetch(t);S.set("last_price_fetch",t);
      S.set("last_price_fetch_ts",Date.now());
    }catch(e){
      console.error("Fiyat çekme hatası:",e);
      // İnternet yoksa veya API hatalıysa cache'ten devam et
      const cached=S.get("cached_prices",null);
      if(cached){
        upd(st=>{st.prices={...st.prices,...cached};});
        setOffline(true);
      } else {
        setFetchError(`Bağlanamadı: ${e.message}`);
      }
    }
    setLoading(false);
  };

  useEffect(()=>{
    const last=S.get("last_price_fetch_ts",0);
    if(Date.now()-last>30*60*1000)fetchPrices();
  },[]);

  return (
    <div style={s.tc}>
      <div style={s.stitle}>Varlık Takibi</div>
      <div style={s.kgrid}>
        <KpiCard label="Toplam Varlık" value={fmt(nw)} color="#e9c46a" icon="◈"/>
        <KpiCard label="Nakit & Mevduat" value={fmt(cashVal)} color="#2a9d8f" icon="₺"/>
        <KpiCard label="Yatırım Portföyü" value={fmt(portfolioVal)} color="#f4a261" icon="📊"/>
      </div>

      {/* Canlı Fiyat Kartı */}
      <div style={{...s.card,borderColor:"rgba(233,196,106,.2)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div style={s.ctitle}>📡 Canlı Piyasa Fiyatları</div>
          <button style={{...s.addbtn,padding:"5px 12px",fontSize:11,opacity:loading?0.6:1}} onClick={fetchPrices} disabled={loading}>
            {loading?"⏳ Çekiliyor...":"↻ Güncelle"}
          </button>
        </div>
        {offline&&<div style={{color:"#e9c46a",fontSize:11,marginBottom:8}}>📴 İnternet yok — en son kayıtlı fiyatlar kullanılıyor</div>}
        {fetchError&&<div style={{color:"#e63946",fontSize:11,marginBottom:8}}>⚠ {fetchError}</div>}
        {lastFetch&&<div style={{color:"#555",fontSize:10,marginBottom:11}}>Son güncelleme: {lastFetch} · gold-api.com & frankfurter.app</div>}
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))",gap:9}}>
          {[
            {label:"Gram Altın",value:p.gold_gram,unit:"₺/gr",color:"#f4a261"},
            {label:"Çeyrek Altın",value:Math.round(p.gold_gram*1.75),unit:"₺",color:"#f4a261"},
            {label:"Yarım Altın",value:Math.round(p.gold_gram*3.5),unit:"₺",color:"#f4a261"},
            {label:"Tam Altın",value:Math.round(p.gold_gram*7),unit:"₺",color:"#f4a261"},
            {label:"USD/TL",value:p.usd,unit:"₺",color:"#4285f4"},
            {label:"EUR/TL",value:p.eur,unit:"₺",color:"#34a853"},
          ].map(item=>(
            <div key={item.label} style={{background:"rgba(255,255,255,.04)",borderRadius:9,padding:"9px 11px",border:`1px solid ${item.color}22`}}>
              <div style={{fontSize:9,color:"#888",marginBottom:3}}>{item.label}</div>
              <div style={{fontSize:15,fontWeight:800,color:item.color}}>{masked?"••••":item.value>0?item.value.toLocaleString("tr-TR"):"—"}</div>
              <div style={{fontSize:9,color:"#555",marginTop:2}}>{item.unit}</div>
            </div>
          ))}
        </div>
        <div style={{...s.frow,marginTop:12}}>
          {[["gold_gram","Gram Altın (₺)"],["usd","USD/TL"],["eur","EUR/TL"]].map(([k,l])=>(
            <div key={k} style={s.pf}><label style={s.pl}>{l} (manuel)</label><input style={s.inp} type="number" value={p[k]} onChange={e=>upd(st=>{st.prices={...st.prices,[k]:+e.target.value};})}/></div>
          ))}
        </div>
      </div>

      {/* Nakit */}
      <div style={s.card}>
        <div style={s.ctitle}>💵 Nakit & Banka</div>
        {[
          ["cash_try","Nakit TL","₺",1],
          ["cash_usd","Dolar","$",p.usd],
          ["cash_eur","Euro","€",p.eur],
          ["other","Diğer","₺",1],
        ].map(([k,l,u,rate])=>(
          <div key={k} style={s.arow}>
            <div><div style={s.albl}>{l}</div>{a[k]>0&&u!=="₺"&&<div style={{fontSize:9,color:"#2a9d8f"}}>{masked?"••••":fmt(a[k]*rate)}</div>}</div>
            <div style={s.ai}>
              <input style={s.ainp} type="number" value={a[k]} onChange={e=>upd(st=>{st.assets={...st.assets,[k]:+e.target.value};})}/>

  const [toast,setToast]=useState(null);

  const tokenClientRef=useRef(null);

  useEffect(()=>{S.set("bütçe_app_v4",state);},[state]);
  useEffect(()=>{if(toast){const t=setTimeout(()=>setToast(null),3200);return()=>clearTimeout(t);}},[toast]);

  const showToast=(msg,type="success")=>setToast({msg,type});
  const upd=useCallback((fn)=>setState(st=>{const ns={...st};fn(ns);return ns;}),[]);

  useEffect(()=>{
    const iv=setInterval(()=>{
      if(window.google?.accounts?.oauth2){
        clearInterval(iv);
        tokenClientRef.current=window.google.accounts.oauth2.initTokenClient({

        });
      }
    },200);
    return()=>clearInterval(iv);
  },[]);

  useEffect(()=>{if(state.notifGranted)checkAndNotify(state);},[]);

  const connectDrive=()=>{if(tokenClientRef.current)tokenClientRef.current.requestAccessToken();else showToast("Google API yükleniyor...","error");};
  const requestNotif=async()=>{
    if("Notification" in window){
      const res=await Notification.requestPermission();
      upd(st=>{st.notifGranted=res==="granted";});
      if(res==="granted"){showToast("Bildirimler aktif! 🔔");checkAndNotify(state);}
    }
  };
  const saveToDrive=async()=>{
    if(!driveToken){connectDrive();return;}
    setDriveStatus("syncing");
    try{await saveToD(driveToken,state);const t=new Date().toLocaleTimeString("tr-TR");setLastSync(t);S.set("last_sync",t);setDriveStatus("synced");showToast("Drive'a kaydedildi ✓");}
    catch(e){setDriveStatus("error");showToast("Kaydetme hatası: "+e.message,"error");}
  };
  const loadFromDrive=async()=>{
    if(!driveToken){connectDrive();return;}
    setDriveStatus("syncing");
    try{const data=await loadFromD(driveToken);if(data){setState({...defaultState(),...data});showToast("Drive'dan yüklendi ✓");}else showToast("Drive'da kayıt bulunamadı");setDriveStatus("synced");}
    catch(e){setDriveStatus("error");showToast("Yükleme hatası: "+e.message,"error");}
  };

  const [masked,setMaskedLocal]=useState(_masked);
  useEffect(()=>{
    const fn=v=>setMaskedLocal(v);
    maskListeners.push(fn);
    return()=>{const i=maskListeners.indexOf(fn);if(i>-1)maskListeners.splice(i,1)};
  },[]);

  const toggleMask=()=>{
    if(masked){tryUnmask();}
    else{setMasked(true);}
  };
    upd(st=>{
      if(!st.monthlyData[mkey])st.monthlyData={...st.monthlyData,[mkey]:{}};
      const md={...st.monthlyData[mkey]};const payments={...(md.payments||{})};
      payments[itemId]=!payments[itemId];md.payments=payments;
      st.monthlyData={...st.monthlyData,[mkey]:md};
    });
    showToast("Ödeme durumu güncellendi ✓");
  };
  const toggleIncome=(mkey,itemId)=>{
    upd(st=>{
      if(!st.monthlyData[mkey])st.monthlyData={...st.monthlyData,[mkey]:{}};
      const md={...st.monthlyData[mkey]};const ic={...(md.incomeCollected||{})};
      ic[itemId]=!ic[itemId];md.incomeCollected=ic;
      st.monthlyData={...st.monthlyData,[mkey]:md};
    });
    showToast("Gelir durumu güncellendi ✓");
  };

  const todayDue=()=>{
    const key=getMonthKey(CY,CM);const payments=state.monthlyData[key]?.payments||{};
    const due=[];
    state.expenseItems.filter(i=>i.active&&i.dueDay===CD).forEach(i=>{if(!payments[i.id])due.push({...i,key});});
    state.creditCards.forEach(c=>{
      if(c.dueDay===CD)due.push({id:c.id,label:`${c.label} Son Ödeme`,key,isCard:true});
      if(c.cutDay===CD)due.push({id:`cut_${c.id}`,label:`${c.label} Hesap Kesim`,key,isCard:true,isCut:true});
    });
    return due;
  };
  const todayIncomeItems=()=>{
    const key=getMonthKey(CY,CM);const ic=state.monthlyData[key]?.incomeCollected||{};
    return state.incomeItems.filter(i=>i.active&&i.incomeDay===CD&&!ic[i.id]);
  };

  let cum=0;
  const forecastWithCumul=Array.from({length:12},(_,m)=>{
    const income=getMonthIncome(state,CY,m);const expense=getMonthExpense(state,CY,m);
    cum+=income-expense;return{m,income,expense,net:income-expense,cumulative:cum};
  });

  const due=todayDue();const tIncome=todayIncomeItems();
  const tab=state.activeTab;
  const setTab=t=>upd(st=>{st.activeTab=t;});

  const tabs=[
    {id:"dashboard",icon:"◉",label:"Özet"},
    {id:"income",icon:"↑",label:"Gelirler"},
    {id:"expenses",icon:"↓",label:"Giderler"},
    {id:"payments",icon:"✓",label:"Ödemeler"},
    {id:"cards",icon:"▣",label:"Kartlar"},
    {id:"portfolio",icon:"📊",label:"Portföy"},
    {id:"assets",icon:"◈",label:"Varlıklar"},
    {id:"forecast",icon:"⤴",label:"Projeksiyon"},
    {id:"budgets",icon:"◎",label:"Bütçeler"},
  ];

  return (
    <div style={s.root}>
      <header style={s.header}>
        <div style={s.headerLeft}>
          <div style={s.logo}>₺</div>
          <div><div style={s.appTitle}>Bütçe Defterim</div><div style={s.appSub}>{CY} · Kişisel Finans</div></div>
        </div>
        <div style={s.hRight}>
          {tIncome.length>0&&<div style={s.badge("rgba(42,157,143,.2)","rgba(42,157,143,.4)","#2a9d8f")} onClick={()=>setTab("payments")}>💰 {tIncome.length} gelir bugün</div>}
          {due.length>0&&<div style={s.badge("rgba(230,57,70,.25)","rgba(230,57,70,.5)","#ff8a80")} onClick={()=>setTab("payments")}>🔔 {due.length} ödeme bugün</div>}
          <button style={{...s.btn(masked?"rgba(233,196,106,.2)":"rgba(255,255,255,.08)",masked?"#e9c46a":"#888",masked?"rgba(233,196,106,.3)":"rgba(255,255,255,.1)"),fontSize:16,padding:"4px 10px"}} onClick={toggleMask} title={masked?"Rakamları Göster":"Rakamları Gizle"}>
            {masked?"🔒":"🔓"}
          </button>
          {!state.notifGranted&&<button style={s.btn("rgba(233,196,106,.15)","#e9c46a","rgba(233,196,106,.4)")} onClick={requestNotif}>🔔 Bildirimleri Aç</button>}
          {!driveToken
            ?<button style={s.btn("rgba(66,133,244,.2)","#4285f4","rgba(66,133,244,.4)")} onClick={connectDrive}>☁ Drive</button>
            :<><button style={s.btn("rgba(42,157,143,.2)","#2a9d8f","rgba(42,157,143,.4)")} onClick={saveToDrive}>{driveStatus==="syncing"?"⏳":"↑ Kaydet"}</button><button style={s.btn("rgba(233,196,106,.15)","#e9c46a","rgba(233,196,106,.3)")} onClick={loadFromDrive}>↓ Yükle</button></>
          }
        </div>
      </header>

      {driveToken&&<div style={{...s.syncBar,color:"#2a9d8f"}}>☁ Drive bağlı{lastSync?` · Son kayıt: ${lastSync}`:" · Henüz kaydedilmedi"}<span style={{marginLeft:"auto",color:"#444"}}>Sadece sizin Drive'ınızda</span></div>}

      <nav style={s.nav}>
        {tabs.map(t=><button key={t.id} style={{...s.navBtn,...(tab===t.id?s.navActive:{})}} onClick={()=>setTab(t.id)}><span>{t.icon}</span><span>{t.label}</span></button>)}
      </nav>

      <main style={s.main}>
        {tab==="dashboard"&&<Dashboard state={state} forecastWithCumul={forecastWithCumul} due={due} todayIncome={tIncome} togglePayment={togglePayment} toggleIncome={toggleIncome}/>}
        {tab==="income"&&<IncomeTab state={state} upd={upd} showToast={showToast}/>}
        {tab==="expenses"&&<ExpensesTab state={state} upd={upd} showToast={showToast}/>}
        {tab==="payments"&&<PaymentsTab state={state} upd={upd} togglePayment={togglePayment} toggleIncome={toggleIncome}/>}
        {tab==="cards"&&<CardsTab state={state} upd={upd} showToast={showToast}/>}
        {tab==="portfolio"&&<PortfolioTab state={state} upd={upd} showToast={showToast}/>}
        {tab==="assets"&&<AssetsTab state={state} upd={upd}/>}
        {tab==="forecast"&&<ForecastTab forecastWithCumul={forecastWithCumul}/>}
        {tab==="budgets"&&<BudgetsTab state={state} upd={upd} showToast={showToast}/>}
      </main>

      {toast&&<div style={{...s.toast,background:toast.type==="error"?"#e63946":"#2a9d8f"}}>{toast.msg}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<BudgetApp/>);
</script>
</body>
</html>
